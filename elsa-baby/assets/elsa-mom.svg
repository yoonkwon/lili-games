<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <defs>
    <linearGradient id="dressGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#81D4FA"/>
      <stop offset="40%" stop-color="#4FC3F7"/>
      <stop offset="100%" stop-color="#0288D1"/>
    </linearGradient>
    <linearGradient id="capeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(129,212,250,0.5)"/>
      <stop offset="100%" stop-color="rgba(79,195,247,0.15)"/>
    </linearGradient>
    <radialGradient id="skinGrad" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#FFF5F0"/>
      <stop offset="100%" stop-color="#FFE8E0"/>
    </radialGradient>
    <linearGradient id="hairGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#FFF8DC"/>
      <stop offset="30%" stop-color="#F5E6A0"/>
      <stop offset="100%" stop-color="#E8D280"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Cape (behind body) -->
  <path d="M60,120 Q40,200 55,280 L145,280 Q160,200 140,120" fill="url(#capeGrad)" opacity="0.6"/>
  <!-- Cape snowflake decorations -->
  <text x="75" y="220" font-size="12" fill="rgba(255,255,255,0.3)" text-anchor="middle">❄</text>
  <text x="125" y="240" font-size="10" fill="rgba(255,255,255,0.25)" text-anchor="middle">❄</text>
  <text x="100" y="260" font-size="14" fill="rgba(255,255,255,0.2)" text-anchor="middle">❄</text>

  <!-- Braid (behind body, over left shoulder) -->
  <!-- Braid segments -->
  <ellipse cx="62" cy="145" rx="7" ry="10" fill="#F0DC80" transform="rotate(-8,62,145)"/>
  <ellipse cx="59" cy="162" rx="6.5" ry="9" fill="#F5E6A0" transform="rotate(-5,59,162)"/>
  <ellipse cx="57" cy="178" rx="6" ry="8.5" fill="#F0DC80" transform="rotate(-3,57,178)"/>
  <ellipse cx="56" cy="193" rx="5.5" ry="8" fill="#F5E6A0"/>
  <ellipse cx="55" cy="207" rx="5" ry="7.5" fill="#F0DC80"/>
  <ellipse cx="55" cy="220" rx="4.5" ry="7" fill="#F5E6A0"/>
  <!-- Braid tie -->
  <circle cx="55" cy="228" r="4" fill="#B3E5FC" stroke="#4FC3F7" stroke-width="1"/>

  <!-- Dress body -->
  <path d="M65,130 Q60,160 55,220 L55,280 L145,280 L145,220 Q140,160 135,130 Q120,118 100,116 Q80,118 65,130Z" fill="url(#dressGrad)"/>

  <!-- Crystallized bodice detail -->
  <path d="M72,130 L100,145 L128,130 Q120,120 100,116 Q80,120 72,130Z" fill="#29B6F6" opacity="0.6"/>
  <path d="M78,128 L100,140 L122,128" stroke="rgba(255,255,255,0.3)" stroke-width="1" fill="none"/>

  <!-- Off-shoulder neckline -->
  <path d="M65,120 Q80,112 100,110 Q120,112 135,120" stroke="#81D4FA" stroke-width="2" fill="none"/>

  <!-- Dress shimmer highlights -->
  <ellipse cx="85" cy="160" rx="8" ry="20" fill="rgba(255,255,255,0.08)" transform="rotate(-5,85,160)"/>
  <ellipse cx="118" cy="200" rx="6" ry="15" fill="rgba(255,255,255,0.06)" transform="rotate(5,118,200)"/>

  <!-- Snowflake on bodice -->
  <text x="100" y="170" font-size="14" fill="rgba(255,255,255,0.25)" text-anchor="middle">❄</text>

  <!-- Translucent sleeves -->
  <ellipse cx="62" cy="128" rx="12" ry="8" fill="rgba(129,212,250,0.35)" transform="rotate(-15,62,128)"/>
  <ellipse cx="138" cy="128" rx="12" ry="8" fill="rgba(129,212,250,0.35)" transform="rotate(15,138,128)"/>

  <!-- Neck -->
  <rect x="93" y="98" width="14" height="18" rx="4" fill="url(#skinGrad)"/>

  <!-- Head -->
  <ellipse cx="100" cy="72" rx="34" ry="38" fill="url(#skinGrad)"/>

  <!-- Jaw / chin (more pointed, Disney style) -->
  <path d="M72,80 Q78,105 100,112 Q122,105 128,80" fill="url(#skinGrad)"/>

  <!-- Hair back volume (only on top/back of head, NOT covering forehead) -->
  <ellipse cx="100" cy="42" rx="38" ry="26" fill="url(#hairGrad)"/>

  <!-- Hair swept back top (stops well above eyebrows) -->
  <path d="M64,48 Q66,20 90,14 Q110,10 130,18 Q145,26 142,46 L138,40 Q130,24 110,20 Q90,18 76,30 Q68,38 66,48Z" fill="#EDD98A"/>

  <!-- Side-swept bangs (short, ends at top of forehead ~y50) -->
  <path d="M68,48 Q74,32 92,24 Q100,22 106,26 Q98,32 88,36 Q78,42 70,50Z" fill="#F5E6A0"/>
  <!-- Bangs highlight -->
  <path d="M74,40 Q82,30 95,26 Q90,32 82,38Z" fill="#FFF8DC" opacity="0.5"/>

  <!-- Hairline shadow (clear boundary between hair and skin) -->
  <path d="M68,48 Q80,52 100,50 Q120,48 132,46" stroke="rgba(180,140,80,0.3)" stroke-width="1.2" fill="none"/>

  <!-- Side hair (right, starts from ear level) -->
  <ellipse cx="136" cy="68" rx="7" ry="20" fill="#EDD98A" transform="rotate(5,136,68)"/>

  <!-- Side hair (left, shorter - braid starts here) -->
  <ellipse cx="64" cy="64" rx="6" ry="16" fill="#EDD98A" transform="rotate(-5,64,64)"/>

  <!-- Braid start connection -->
  <path d="M64,80 Q58,100 60,120 Q62,130 62,140" stroke="#F0DC80" stroke-width="12" fill="none" stroke-linecap="round"/>

  <!-- Eyes - large, Disney style, deep sky blue -->
  <!-- Eyes are at y=75 area, well below hair which stops at ~y50 -->
  <!-- Left eye -->
  <ellipse cx="86" cy="75" rx="10" ry="11" fill="white"/>
  <ellipse cx="86" cy="76" rx="8" ry="9" fill="#4FC3F7"/>
  <ellipse cx="86" cy="76" rx="6" ry="7" fill="#29B6F6"/>
  <circle cx="86" cy="77" r="4" fill="#01579B"/>
  <circle cx="83" cy="73" r="2.5" fill="white"/>
  <circle cx="89" cy="79" r="1.2" fill="white"/>
  <!-- Left upper eyelid -->
  <path d="M76,71 Q82,65 96,71" stroke="#5D4037" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Left eyelashes -->
  <line x1="77" y1="71" x2="74" y2="67" stroke="#5D4037" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="80" y1="68" x2="78" y2="64" stroke="#5D4037" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="84" y1="66" x2="83" y2="62" stroke="#5D4037" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Left lower lash line -->
  <path d="M78,83 Q86,86 94,83" stroke="#8D6E63" stroke-width="0.8" fill="none"/>

  <!-- Right eye -->
  <ellipse cx="114" cy="75" rx="10" ry="11" fill="white"/>
  <ellipse cx="114" cy="76" rx="8" ry="9" fill="#4FC3F7"/>
  <ellipse cx="114" cy="76" rx="6" ry="7" fill="#29B6F6"/>
  <circle cx="114" cy="77" r="4" fill="#01579B"/>
  <circle cx="111" cy="73" r="2.5" fill="white"/>
  <circle cx="117" cy="79" r="1.2" fill="white"/>
  <!-- Right upper eyelid -->
  <path d="M104,71 Q110,65 124,71" stroke="#5D4037" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Right eyelashes -->
  <line x1="123" y1="71" x2="126" y2="67" stroke="#5D4037" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="120" y1="68" x2="122" y2="64" stroke="#5D4037" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="116" y1="66" x2="117" y2="62" stroke="#5D4037" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Right lower lash line -->
  <path d="M106,83 Q114,86 122,83" stroke="#8D6E63" stroke-width="0.8" fill="none"/>

  <!-- Eyebrows - elegant arched (between hair and eyes) -->
  <path d="M76,63 Q84,57 94,61" stroke="#C8A84E" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M106,61 Q116,57 124,63" stroke="#C8A84E" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- Nose - small, delicate -->
  <path d="M98,86 Q100,90 102,88" stroke="#E0B0A0" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Freckles (very subtle) -->
  <circle cx="82" cy="86" r="0.8" fill="#E0C8B8" opacity="0.5"/>
  <circle cx="85" cy="88" r="0.6" fill="#E0C8B8" opacity="0.4"/>
  <circle cx="115" cy="86" r="0.8" fill="#E0C8B8" opacity="0.5"/>
  <circle cx="118" cy="88" r="0.6" fill="#E0C8B8" opacity="0.4"/>

  <!-- Lips - thin, rosy pink -->
  <!-- Upper lip -->
  <path d="M93,96 Q96,93 100,94 Q104,93 107,96 Q104,97 100,97.5 Q96,97 93,96Z" fill="#D4727A"/>
  <!-- Lower lip -->
  <path d="M94,97 Q100,102 106,97 Q104,98 100,98.5 Q96,98 94,97Z" fill="#E08888"/>
  <!-- Lip highlight -->
  <ellipse cx="100" cy="95" rx="2.5" ry="0.8" fill="rgba(255,255,255,0.3)"/>

  <!-- Blush -->
  <ellipse cx="78" cy="86" rx="8" ry="4" fill="rgba(255,160,180,0.15)"/>
  <ellipse cx="122" cy="86" rx="8" ry="4" fill="rgba(255,160,180,0.15)"/>

  <!-- Tiara / ice crystal crown -->
  <g filter="url(#glow)">
    <path d="M80,38 L84,28 L90,34 L95,22 L100,18 L105,22 L110,34 L116,28 L120,38" fill="#B3E5FC" stroke="#4FC3F7" stroke-width="1.2"/>
    <!-- Center gem -->
    <circle cx="100" cy="26" r="3.5" fill="#E1F5FE"/>
    <circle cx="100" cy="26" r="2" fill="#4FC3F7"/>
    <circle cx="99" cy="25" r="0.8" fill="white"/>
    <!-- Side gems -->
    <circle cx="90" cy="32" r="1.8" fill="#E1F5FE"/>
    <circle cx="110" cy="32" r="1.8" fill="#E1F5FE"/>
  </g>
</svg>
