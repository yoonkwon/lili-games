<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <defs>
    <linearGradient id="dressGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E5CB8"/>
      <stop offset="40%" stop-color="#1E4A9A"/>
      <stop offset="100%" stop-color="#14387A"/>
    </linearGradient>
    <linearGradient id="skirtGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#E8C000"/>
    </linearGradient>
    <radialGradient id="skinGrad" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#FFF5F0"/>
      <stop offset="100%" stop-color="#FFE8E0"/>
    </radialGradient>
    <linearGradient id="hairGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#2C2C54"/>
      <stop offset="30%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#0D0D1A"/>
    </linearGradient>
    <radialGradient id="sleeveGrad" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#4A7FE0"/>
      <stop offset="100%" stop-color="#2E5CB8"/>
    </radialGradient>
  </defs>

  <!-- Yellow skirt -->
  <path d="M55,220 Q50,250 42,280 L158,280 Q150,250 145,220Z" fill="url(#skirtGrad)"/>
  <!-- Skirt folds -->
  <path d="M78,225 Q76,252 72,280" fill="none" stroke="#D4A800" stroke-width="0.8" opacity="0.3"/>
  <path d="M100,220 Q100,250 100,280" fill="none" stroke="#D4A800" stroke-width="0.8" opacity="0.2"/>
  <path d="M122,225 Q124,252 128,280" fill="none" stroke="#D4A800" stroke-width="0.8" opacity="0.3"/>

  <!-- Blue bodice -->
  <path d="M65,130 Q60,160 55,220 L145,220 Q140,160 135,130 Q120,118 100,116 Q80,118 65,130Z" fill="url(#dressGrad)"/>

  <!-- Bodice center detail -->
  <line x1="100" y1="130" x2="100" y2="220" stroke="#142E6A" stroke-width="0.8" opacity="0.3"/>

  <!-- High white collar -->
  <path d="M72,118 Q78,108 90,106 Q95,112 100,114 Q105,112 110,106 Q122,108 128,118 Q118,125 100,128 Q82,125 72,118Z" fill="white" stroke="#E0E0E0" stroke-width="0.5"/>

  <!-- Puffy blue sleeves -->
  <ellipse cx="62" cy="132" rx="16" ry="18" fill="url(#sleeveGrad)" stroke="#1A3A7A" stroke-width="0.5"/>
  <ellipse cx="138" cy="132" rx="16" ry="18" fill="url(#sleeveGrad)" stroke="#1A3A7A" stroke-width="0.5"/>
  <!-- Red sleeve bands -->
  <path d="M50,146 Q56,153 62,153 Q68,153 74,146" fill="none" stroke="#CC2233" stroke-width="3" stroke-linecap="round"/>
  <path d="M126,146 Q132,153 138,153 Q144,153 150,146" fill="none" stroke="#CC2233" stroke-width="3" stroke-linecap="round"/>

  <!-- Arms -->
  <path d="M50,152 Q46,170 48,188" fill="none" stroke="#FFE8E0" stroke-width="8" stroke-linecap="round"/>
  <path d="M150,152 Q154,170 152,188" fill="none" stroke="#FFE8E0" stroke-width="8" stroke-linecap="round"/>

  <!-- Neck -->
  <rect x="93" y="98" width="14" height="18" rx="4" fill="url(#skinGrad)"/>

  <!-- Head -->
  <ellipse cx="100" cy="72" rx="34" ry="38" fill="url(#skinGrad)"/>

  <!-- Jaw / chin -->
  <path d="M72,80 Q78,105 100,112 Q122,105 128,80" fill="url(#skinGrad)"/>

  <!-- === HAIR (black bob with curls, NOT covering forehead) === -->
  <!-- Hair back volume -->
  <ellipse cx="100" cy="42" rx="38" ry="26" fill="url(#hairGrad)"/>

  <!-- Hair top swept (stops above eyebrows ~y50) -->
  <path d="M64,48 Q66,20 90,14 Q110,10 130,18 Q145,26 142,46 L138,40 Q130,24 110,20 Q90,18 76,30 Q68,38 66,48Z" fill="#1A1A2E"/>

  <!-- Center-parted bangs -->
  <path d="M68,48 Q74,30 90,22 Q98,20 100,20 Q102,20 110,22 Q126,30 132,48 Q122,38 110,32 Q102,30 100,30 Q98,30 90,32 Q78,38 68,48Z" fill="#2C2C54"/>
  <!-- Bangs highlight -->
  <path d="M82,30 Q90,24 100,22 Q110,24 118,30" fill="none" stroke="#4A4A6A" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>

  <!-- Hairline shadow -->
  <path d="M68,48 Q80,52 100,50 Q120,48 132,46" stroke="rgba(120,80,60,0.2)" stroke-width="1" fill="none"/>

  <!-- Left side bob (curls outward at bottom) -->
  <path d="M64,48 Q58,60 56,80 Q54,95 56,105" fill="none" stroke="url(#hairGrad)" stroke-width="14" stroke-linecap="round"/>
  <!-- Left curl at tip -->
  <path d="M52,100 Q46,110 50,116 Q56,118 58,110 Q58,104 56,100" fill="#1A1A2E"/>

  <!-- Right side bob -->
  <path d="M136,48 Q142,60 144,80 Q146,95 144,105" fill="none" stroke="url(#hairGrad)" stroke-width="14" stroke-linecap="round"/>
  <!-- Right curl at tip -->
  <path d="M148,100 Q154,110 150,116 Q144,118 142,110 Q142,104 144,100" fill="#1A1A2E"/>

  <!-- === RED HEADBAND + BOW === -->
  <path d="M64,46 Q68,28 82,20 Q92,14 100,12 Q108,14 118,20 Q132,28 136,46" fill="none" stroke="#CC2233" stroke-width="5" stroke-linecap="round"/>
  <!-- Bow on top -->
  <path d="M100,14 Q86,2 80,8 Q78,14 86,18 Q94,14 100,14Z" fill="#CC2233"/>
  <path d="M100,14 Q114,2 120,8 Q122,14 114,18 Q106,14 100,14Z" fill="#CC2233"/>
  <circle cx="100" cy="14" r="3.5" fill="#DD3344"/>
  <!-- Bow highlights -->
  <path d="M86,8 Q90,4 94,8" fill="none" stroke="#FF5566" stroke-width="0.8" opacity="0.4"/>
  <path d="M106,8 Q110,4 114,8" fill="none" stroke="#FF5566" stroke-width="0.8" opacity="0.4"/>

  <!-- === FACE (same layout as Elsa) === -->
  <!-- Eyes - large, Disney style, warm brown -->
  <!-- Left eye -->
  <ellipse cx="86" cy="75" rx="10" ry="11" fill="white"/>
  <ellipse cx="86" cy="76" rx="8" ry="9" fill="#8B5E3C"/>
  <ellipse cx="86" cy="76" rx="6" ry="7" fill="#6B4226"/>
  <circle cx="86" cy="77" r="4" fill="#3A2010"/>
  <circle cx="83" cy="73" r="2.5" fill="white"/>
  <circle cx="89" cy="79" r="1.2" fill="white"/>
  <!-- Left upper eyelid -->
  <path d="M76,71 Q82,65 96,71" stroke="#5D4037" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Left eyelashes -->
  <line x1="77" y1="71" x2="74" y2="67" stroke="#5D4037" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="80" y1="68" x2="78" y2="64" stroke="#5D4037" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="84" y1="66" x2="83" y2="62" stroke="#5D4037" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Left lower lash line -->
  <path d="M78,83 Q86,86 94,83" stroke="#8D6E63" stroke-width="0.8" fill="none"/>

  <!-- Right eye -->
  <ellipse cx="114" cy="75" rx="10" ry="11" fill="white"/>
  <ellipse cx="114" cy="76" rx="8" ry="9" fill="#8B5E3C"/>
  <ellipse cx="114" cy="76" rx="6" ry="7" fill="#6B4226"/>
  <circle cx="114" cy="77" r="4" fill="#3A2010"/>
  <circle cx="111" cy="73" r="2.5" fill="white"/>
  <circle cx="117" cy="79" r="1.2" fill="white"/>
  <path d="M104,71 Q110,65 124,71" stroke="#5D4037" stroke-width="2" fill="none" stroke-linecap="round"/>
  <line x1="123" y1="71" x2="126" y2="67" stroke="#5D4037" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="120" y1="68" x2="122" y2="64" stroke="#5D4037" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="116" y1="66" x2="117" y2="62" stroke="#5D4037" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M106,83 Q114,86 122,83" stroke="#8D6E63" stroke-width="0.8" fill="none"/>

  <!-- Eyebrows -->
  <path d="M76,63 Q84,57 94,61" stroke="#3A2A1A" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M106,61 Q116,57 124,63" stroke="#3A2A1A" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
  <path d="M98,86 Q100,90 102,88" stroke="#E0B0A0" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Lips - red rosebud smile (Snow White signature) -->
  <path d="M91,94 Q96,92 100,93 Q104,92 109,94 Q106,96 100,97 Q94,96 91,94Z" fill="#CC2233"/>
  <path d="M92,95 Q96,101 100,102 Q104,101 108,95 Q104,97 100,97.5 Q96,97 92,95Z" fill="#DD3344"/>
  <ellipse cx="100" cy="93.5" rx="2.5" ry="0.8" fill="rgba(255,255,255,0.3)"/>

  <!-- Blush (rosy, warmer than Elsa) -->
  <ellipse cx="78" cy="86" rx="8" ry="4" fill="rgba(255,140,160,0.25)"/>
  <ellipse cx="122" cy="86" rx="8" ry="4" fill="rgba(255,140,160,0.25)"/>
</svg>