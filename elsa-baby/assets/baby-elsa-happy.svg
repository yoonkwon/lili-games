<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <radialGradient id="babySkin" cx="0.5" cy="0.45" r="0.5">
      <stop offset="0%" stop-color="#FFF8F5"/>
      <stop offset="100%" stop-color="#FFE8E0"/>
    </radialGradient>
  </defs>
  <circle cx="60" cy="60" r="45" fill="url(#babySkin)"/>
  <!-- Hair tuft -->
  <path d="M42,22 Q48,8 60,6 Q72,8 78,22 Q72,14 60,12 Q48,14 42,22Z" fill="#F5E6A0"/>
  <path d="M30,35 Q28,28 35,24 Q32,30 32,36Z" fill="#F0DC80"/>
  <path d="M90,35 Q92,28 85,24 Q88,30 88,36Z" fill="#F0DC80"/>
  <!-- Happy eyes (closed arcs) -->
  <path d="M38,55 Q47,48 56,55" stroke="#29B6F6" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M64,55 Q73,48 82,55" stroke="#29B6F6" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Cheeks (brighter when happy) -->
  <ellipse cx="36" cy="64" rx="9" ry="6" fill="rgba(255,150,170,0.4)"/>
  <ellipse cx="84" cy="64" rx="9" ry="6" fill="rgba(255,150,170,0.4)"/>
  <!-- Nose -->
  <circle cx="60" cy="63" r="2" fill="rgba(230,180,160,0.4)"/>
  <!-- Big happy smile -->
  <path d="M48,70 Q54,82 60,82 Q66,82 72,70" stroke="#E07070" stroke-width="2" fill="rgba(240,160,160,0.4)" stroke-linecap="round"/>
  <!-- Sparkles -->
  <text x="88" y="28" font-size="12" fill="#FFD700" opacity="0.7" text-anchor="middle">✨</text>
  <text x="30" y="32" font-size="10" fill="#FFD700" opacity="0.5" text-anchor="middle">✨</text>
</svg>
