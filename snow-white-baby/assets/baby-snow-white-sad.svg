<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <radialGradient id="bSkinS" cx="50%" cy="42%" r="50%">
      <stop offset="0%" stop-color="#FFF8F5"/>
      <stop offset="100%" stop-color="#FFE8DD"/>
    </radialGradient>
    <linearGradient id="bHairS" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#1C1C30"/>
      <stop offset="100%" stop-color="#0A0A18"/>
    </linearGradient>
    <radialGradient id="bEyeS" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#A0724A"/>
      <stop offset="60%" stop-color="#7B5230"/>
      <stop offset="100%" stop-color="#5A3A1E"/>
    </radialGradient>
    <radialGradient id="tearGrad" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#CCE5FF"/>
      <stop offset="100%" stop-color="#88CCFF"/>
    </radialGradient>
  </defs>

  <!-- Onesie body -->
  <path d="M36 80 Q33 95 30 115 L90 115 Q87 95 84 80 Z" fill="#6CA8E8" stroke="#5090D0" stroke-width="0.5"/>
  <path d="M42 78 Q48 73 60 72 Q72 73 78 78 Q72 82 60 84 Q48 82 42 78 Z" fill="white" stroke="#E8E8E8" stroke-width="0.4"/>

  <rect x="55" y="68" width="10" height="10" rx="3" fill="url(#bSkinS)"/>

  <!-- Head -->
  <circle cx="60" cy="42" r="32" fill="url(#bSkinS)" stroke="#F0D0C0" stroke-width="0.3"/>

  <!-- Hair -->
  <path d="M30 38 Q28 15 42 8 Q52 2 60 1 Q68 2 78 8 Q92 15 90 38 Q92 50 90 60 L87 58 Q88 48 88 40 Q88 20 76 12 Q66 5 60 4 Q54 5 44 12 Q32 20 32 40 Q32 48 33 58 L30 60 Q28 50 30 38 Z" fill="url(#bHairS)"/>
  <path d="M32 36 Q30 22 40 12 Q48 6 56 4 L52 12 Q42 18 38 30 Q34 40 34 52 Q32 56 30 54 Q30 44 32 36 Z" fill="url(#bHairS)"/>
  <path d="M88 36 Q90 22 80 12 Q72 6 64 4 L68 12 Q78 18 82 30 Q86 40 86 52 Q88 56 90 54 Q90 44 88 36 Z" fill="url(#bHairS)"/>
  <path d="M34 28 Q36 10 50 4 Q56 1 60 0 Q64 1 70 4 Q84 10 86 28 Q76 14 60 10 Q44 14 34 28 Z" fill="#1C1C30"/>
  <path d="M30 53 Q26 58 28 62 Q32 64 35 58 Q36 54 34 52" fill="#0A0A18"/>
  <path d="M90 53 Q94 58 92 62 Q88 64 85 58 Q84 54 86 52" fill="#0A0A18"/>

  <!-- Headband -->
  <path d="M32 25 Q36 12 48 6 Q54 2 60 1 Q66 2 72 6 Q84 12 88 25" fill="none" stroke="#DD2244" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M60 3 Q52 -4 50 0 Q48 4 54 7 Q58 4 60 3 Z" fill="#DD2244"/>
  <path d="M60 3 Q68 -4 70 0 Q72 4 66 7 Q62 4 60 3 Z" fill="#DD2244"/>
  <circle cx="60" cy="3" r="2.5" fill="#EE3355"/>

  <!-- Sad eyebrows (angled up in center) -->
  <path d="M40 31 Q45 34 52 32" fill="none" stroke="#2A2A3E" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <path d="M68 32 Q75 34 80 31" fill="none" stroke="#2A2A3E" stroke-width="1" stroke-linecap="round" opacity="0.5"/>

  <!-- Sad eyes - big watery eyes looking up -->
  <!-- Left eye -->
  <ellipse cx="47" cy="44" rx="10" ry="11.5" fill="white" stroke="#2A2A3E" stroke-width="0.4"/>
  <ellipse cx="48" cy="45" rx="7" ry="8" fill="url(#bEyeS)"/>
  <circle cx="48" cy="46" r="4" fill="#1A1A2E"/>
  <circle cx="44" cy="41" r="3" fill="white" opacity="0.95"/>
  <circle cx="51" cy="48" r="1.5" fill="white" opacity="0.5"/>
  <!-- Watery sheen -->
  <path d="M38 50 Q47 54 56 50" fill="#CCE5FF" opacity="0.25"/>
  <path d="M37 40 Q42 35 48 34 Q54 35 57 40" stroke="#1A1A2E" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <line x1="38" y1="39" x2="36" y2="36" stroke="#1A1A2E" stroke-width="1" stroke-linecap="round"/>

  <!-- Right eye -->
  <ellipse cx="73" cy="44" rx="10" ry="11.5" fill="white" stroke="#2A2A3E" stroke-width="0.4"/>
  <ellipse cx="72" cy="45" rx="7" ry="8" fill="url(#bEyeS)"/>
  <circle cx="72" cy="46" r="4" fill="#1A1A2E"/>
  <circle cx="68" cy="41" r="3" fill="white" opacity="0.95"/>
  <circle cx="75" cy="48" r="1.5" fill="white" opacity="0.5"/>
  <path d="M64 50 Q73 54 82 50" fill="#CCE5FF" opacity="0.25"/>
  <path d="M63 40 Q68 35 72 34 Q78 35 83 40" stroke="#1A1A2E" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <line x1="82" y1="39" x2="84" y2="36" stroke="#1A1A2E" stroke-width="1" stroke-linecap="round"/>

  <!-- Tear drops -->
  <path d="M42 54 Q41 60 42 66 Q43 68 44 66 Q45 60 44 54 Z" fill="url(#tearGrad)" opacity="0.7"/>
  <path d="M76 54 Q75 60 76 66 Q77 68 78 66 Q79 60 78 54 Z" fill="url(#tearGrad)" opacity="0.7"/>
  <ellipse cx="42" cy="70" rx="1.5" ry="2" fill="#88CCFF" opacity="0.4"/>
  <ellipse cx="77" cy="72" rx="1.2" ry="1.8" fill="#88CCFF" opacity="0.3"/>

  <!-- Slightly red nose -->
  <ellipse cx="60" cy="53" rx="2.8" ry="2.2" fill="#FFD0BC" stroke="#F0C0B0" stroke-width="0.3"/>

  <!-- Cheeks -->
  <ellipse cx="36" cy="55" rx="7" ry="5" fill="#FFB0B0" opacity="0.45"/>
  <ellipse cx="84" cy="55" rx="7" ry="5" fill="#FFB0B0" opacity="0.45"/>

  <!-- Frown -->
  <path d="M52 63 Q56 67 60 68 Q64 67 68 63" fill="none" stroke="#DD5566" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M54 65 Q57 68 60 68.5 Q63 68 66 65" fill="#F0A0A0" opacity="0.35"/>

  <!-- Arms hanging sadly -->
  <path d="M34 86 Q28 94 26 104" fill="none" stroke="#FFE8DD" stroke-width="6" stroke-linecap="round"/>
  <path d="M86 86 Q92 94 94 104" fill="none" stroke="#FFE8DD" stroke-width="6" stroke-linecap="round"/>
</svg>