<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#90EE90">
  <meta name="apple-mobile-web-app-title" content="백설공주아기">
  <link rel="manifest" href="../manifest.json">
  <link rel="apple-touch-icon" href="../icons/icon-192.png">
  <title>백설공주 아기 키우기</title>
  <style>
    :root {
      --sat: env(safe-area-inset-top, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sal: env(safe-area-inset-left, 0px);
      --sar: env(safe-area-inset-right, 0px);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; height: 100dvh;
      overflow: hidden;
      background: #1a2a1a;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    canvas { display: block; position: absolute; top: env(safe-area-inset-top, 0px); left: env(safe-area-inset-left, 0px); width: calc(100% - env(safe-area-inset-left, 0px) - env(safe-area-inset-right, 0px)); height: calc(100% - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px)); }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="error-display" style="display:none;position:fixed;top:10px;left:10px;right:10px;background:rgba(255,0,0,0.9);color:white;padding:15px;border-radius:8px;font-size:14px;z-index:9999;white-space:pre-wrap;max-height:50vh;overflow:auto;"></div>
  <script>
  window.onerror = function(msg, url, line, col, err) {
      var d = document.getElementById('error-display');
      d.style.display = 'block';
      d.textContent += 'ERROR: ' + msg + '\nat ' + url + ':' + line + ':' + col + '\n' + (err && err.stack ? err.stack : '') + '\n\n';
  };
  window.addEventListener('unhandledrejection', function(e) {
      var d = document.getElementById('error-display');
      d.style.display = 'block';
      d.textContent += 'UNHANDLED: ' + (e.reason && e.reason.stack ? e.reason.stack : e.reason) + '\n\n';
  });
  </script>
  <script type="module" src="js/main.js"></script>
<script>if(screen.orientation&&screen.orientation.lock)screen.orientation.lock("landscape").catch(()=>{});</script>
</body>
</html>
