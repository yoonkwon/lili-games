<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <radialGradient id="bSkin" cx="50%" cy="42%" r="50%">
      <stop offset="0%" stop-color="#FFF8F5"/>
      <stop offset="100%" stop-color="#FFE8DD"/>
    </radialGradient>
    <linearGradient id="bHair" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#1C1C30"/>
      <stop offset="100%" stop-color="#0A0A18"/>
    </linearGradient>
    <radialGradient id="bEye" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#A0724A"/>
      <stop offset="60%" stop-color="#7B5230"/>
      <stop offset="100%" stop-color="#5A3A1E"/>
    </radialGradient>
  </defs>

  <!-- Onesie body (Snow White blue+white) -->
  <path d="M36 80 Q33 95 30 115 L90 115 Q87 95 84 80 Z" fill="#6CA8E8" stroke="#5090D0" stroke-width="0.5"/>
  <!-- White collar on onesie -->
  <path d="M42 78 Q48 73 60 72 Q72 73 78 78 Q72 82 60 84 Q48 82 42 78 Z" fill="white" stroke="#E8E8E8" stroke-width="0.4"/>

  <!-- Neck -->
  <rect x="55" y="68" width="10" height="10" rx="3" fill="url(#bSkin)"/>

  <!-- Head - big round cute baby head -->
  <circle cx="60" cy="42" r="32" fill="url(#bSkin)" stroke="#F0D0C0" stroke-width="0.3"/>

  <!-- === HAIR (baby bob - short black hair) === -->
  <!-- Back hair -->
  <path d="M30 38 Q28 15 42 8 Q52 2 60 1 Q68 2 78 8 Q92 15 90 38 Q92 50 90 60 L87 58 Q88 48 88 40 Q88 20 76 12 Q66 5 60 4 Q54 5 44 12 Q32 20 32 40 Q32 48 33 58 L30 60 Q28 50 30 38 Z" fill="url(#bHair)"/>
  <!-- Left side -->
  <path d="M32 36 Q30 22 40 12 Q48 6 56 4 L52 12 Q42 18 38 30 Q34 40 34 52 Q32 56 30 54 Q30 44 32 36 Z" fill="url(#bHair)"/>
  <!-- Right side -->
  <path d="M88 36 Q90 22 80 12 Q72 6 64 4 L68 12 Q78 18 82 30 Q86 40 86 52 Q88 56 90 54 Q90 44 88 36 Z" fill="url(#bHair)"/>
  <!-- Hair top -->
  <path d="M34 28 Q36 10 50 4 Q56 1 60 0 Q64 1 70 4 Q84 10 86 28 Q76 14 60 10 Q44 14 34 28 Z" fill="#1C1C30"/>

  <!-- Little baby curls at tips -->
  <path d="M30 53 Q26 58 28 62 Q32 64 35 58 Q36 54 34 52" fill="#0A0A18"/>
  <path d="M90 53 Q94 58 92 62 Q88 64 85 58 Q84 54 86 52" fill="#0A0A18"/>

  <!-- === TINY RED HEADBAND (identifies as Snow White baby) === -->
  <path d="M32 25 Q36 12 48 6 Q54 2 60 1 Q66 2 72 6 Q84 12 88 25" fill="none" stroke="#DD2244" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Mini bow -->
  <path d="M60 3 Q52 -4 50 0 Q48 4 54 7 Q58 4 60 3 Z" fill="#DD2244"/>
  <path d="M60 3 Q68 -4 70 0 Q72 4 66 7 Q62 4 60 3 Z" fill="#DD2244"/>
  <circle cx="60" cy="3" r="2.5" fill="#EE3355"/>

  <!-- === BIG SPARKLY BABY EYES === -->
  <!-- Left eye -->
  <ellipse cx="47" cy="43" rx="11" ry="12" fill="white" stroke="#2A2A3E" stroke-width="0.4"/>
  <ellipse cx="48" cy="44" rx="8" ry="9" fill="url(#bEye)"/>
  <circle cx="48" cy="45" r="4.5" fill="#1A1A2E"/>
  <circle cx="44" cy="39" r="3.5" fill="white" opacity="0.95"/>
  <circle cx="52" cy="48" r="1.8" fill="white" opacity="0.6"/>
  <!-- Star sparkle -->
  <g transform="translate(46,42)" opacity="0.5">
    <line x1="0" y1="-1.5" x2="0" y2="1.5" stroke="white" stroke-width="0.7" stroke-linecap="round"/>
    <line x1="-1.5" y1="0" x2="1.5" y2="0" stroke="white" stroke-width="0.7" stroke-linecap="round"/>
  </g>
  <!-- Upper lid -->
  <path d="M36 38 Q42 32 48 31 Q54 32 58 38" stroke="#1A1A2E" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Baby lashes -->
  <line x1="37" y1="37" x2="34" y2="34" stroke="#1A1A2E" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="40" y1="35" x2="39" y2="31" stroke="#1A1A2E" stroke-width="1" stroke-linecap="round"/>

  <!-- Right eye -->
  <ellipse cx="73" cy="43" rx="11" ry="12" fill="white" stroke="#2A2A3E" stroke-width="0.4"/>
  <ellipse cx="72" cy="44" rx="8" ry="9" fill="url(#bEye)"/>
  <circle cx="72" cy="45" r="4.5" fill="#1A1A2E"/>
  <circle cx="68" cy="39" r="3.5" fill="white" opacity="0.95"/>
  <circle cx="76" cy="48" r="1.8" fill="white" opacity="0.6"/>
  <g transform="translate(70,42)" opacity="0.5">
    <line x1="0" y1="-1.5" x2="0" y2="1.5" stroke="white" stroke-width="0.7" stroke-linecap="round"/>
    <line x1="-1.5" y1="0" x2="1.5" y2="0" stroke="white" stroke-width="0.7" stroke-linecap="round"/>
  </g>
  <path d="M62 38 Q68 32 72 31 Q78 32 84 38" stroke="#1A1A2E" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <line x1="83" y1="37" x2="86" y2="34" stroke="#1A1A2E" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="80" y1="35" x2="81" y2="31" stroke="#1A1A2E" stroke-width="1" stroke-linecap="round"/>

  <!-- Soft eyebrows -->
  <path d="M39 30 Q44 28 51 29" fill="none" stroke="#2A2A3E" stroke-width="0.7" stroke-linecap="round" opacity="0.35"/>
  <path d="M69 29 Q76 28 81 30" fill="none" stroke="#2A2A3E" stroke-width="0.7" stroke-linecap="round" opacity="0.35"/>

  <!-- Button nose (tiny dot) -->
  <circle cx="60" cy="52" r="1.8" fill="#FFD0C0"/>

  <!-- Big rosy cheeks (extra pink) -->
  <ellipse cx="34" cy="53" rx="9" ry="6" fill="#FFB0B8" opacity="0.6"/>
  <ellipse cx="86" cy="53" rx="9" ry="6" fill="#FFB0B8" opacity="0.6"/>
  <!-- Tiny heart on cheek -->
  <path d="M32 51 Q32 49.5 33.2 49.5 Q34 49.5 34 51 Q34 49.5 34.8 49.5 Q36 49.5 36 51 Q36 52.5 34 54 Q32 52.5 32 51 Z" fill="#FF8899" opacity="0.35"/>

  <!-- Tiny cat-smile -->
  <path d="M56 59 Q58 57.5 60 58.5 Q62 57.5 64 59" fill="none" stroke="#DD4466" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M57 59 Q58.5 61.5 60 62 Q61.5 61.5 63 59" fill="#EE5577" stroke="#DD4466" stroke-width="0.2"/>

  <!-- Little arms -->
  <path d="M34 86 Q26 90 24 96" fill="none" stroke="#FFE8DD" stroke-width="6" stroke-linecap="round"/>
  <path d="M86 86 Q94 90 96 96" fill="none" stroke="#FFE8DD" stroke-width="6" stroke-linecap="round"/>
</svg>