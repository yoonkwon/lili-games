<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <radialGradient id="babySkin" cx="0.5" cy="0.45" r="0.5">
      <stop offset="0%" stop-color="#F5F0FF"/>
      <stop offset="100%" stop-color="#E8E0F0"/>
    </radialGradient>
    <filter id="whirlpoolGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Baby head/body (round, slight purple tint when cursed) -->
  <circle cx="60" cy="60" r="45" fill="url(#babySkin)"/>

  <!-- Hair - red wavy tuft (darker when angry) -->
  <path d="M42,22 Q48,8 60,6 Q72,8 78,22 Q72,14 60,12 Q48,14 42,22Z" fill="#C0392B"/>
  <!-- Side wisps -->
  <path d="M30,35 Q26,26 33,22 Q30,28 32,36Z" fill="#A93226"/>
  <path d="M90,35 Q94,26 87,22 Q90,28 88,36Z" fill="#A93226"/>
  <!-- Extra wave -->
  <path d="M54,10 Q58,4 62,8 Q66,4 70,10" fill="none" stroke="#C0392B" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <!-- Tiny seashell decoration (darker purple when cursed) -->
  <path d="M56,14 Q58,8 60,6 Q62,8 64,14 Q62,12 60,10 Q58,12 56,14Z" fill="#6C3483"/>
  <path d="M54,16 Q56,10 60,7 Q64,10 66,16" fill="none" stroke="#5B2C6F" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="58" y1="14" x2="59" y2="9" stroke="#4A235A" stroke-width="0.6" opacity="0.5"/>
  <line x1="60" y1="15" x2="60" y2="8" stroke="#4A235A" stroke-width="0.6" opacity="0.5"/>
  <line x1="62" y1="14" x2="61" y2="9" stroke="#4A235A" stroke-width="0.6" opacity="0.5"/>

  <!-- Tiny green tail fin (slightly dark) -->
  <path d="M48,98 Q40,108 34,106 Q40,100 44,96Z" fill="#1E8449"/>
  <path d="M72,98 Q80,108 86,106 Q80,100 76,96Z" fill="#1E8449"/>
  <path d="M48,96 Q54,102 60,103 Q66,102 72,96 Q66,100 60,101 Q54,100 48,96Z" fill="#196F3D"/>

  <!-- Angry glowing eyes (purple whirlpool curse) -->
  <g filter="url(#whirlpoolGlow)">
    <circle cx="47" cy="56" r="8" fill="#7D3C98"/>
    <circle cx="73" cy="56" r="8" fill="#7D3C98"/>
  </g>
  <circle cx="47" cy="56" r="4" fill="white" opacity="0.8"/>
  <circle cx="73" cy="56" r="4" fill="white" opacity="0.8"/>

  <!-- Angry eyebrows (slanted inward) -->
  <line x1="36" y1="42" x2="54" y2="46" stroke="#4A235A" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="84" y1="42" x2="66" y2="46" stroke="#4A235A" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Cheeks (purple tint) -->
  <ellipse cx="36" cy="66" rx="8" ry="5" fill="rgba(125,60,152,0.2)"/>
  <ellipse cx="84" cy="66" rx="8" ry="5" fill="rgba(125,60,152,0.2)"/>

  <!-- Nose -->
  <circle cx="60" cy="65" r="2" fill="rgba(200,180,210,0.4)"/>

  <!-- Angry mouth -->
  <path d="M50,78 Q56,72 60,72 Q64,72 70,78" stroke="#7D3C98" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Whirlpool particles -->
  <text x="26" y="30" font-size="14" opacity="0.6" text-anchor="middle">🌀</text>
  <text x="94" y="26" font-size="12" opacity="0.5" text-anchor="middle">🌀</text>
  <text x="60" y="14" font-size="8" opacity="0.4" text-anchor="middle">🌀</text>
</svg>