<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <radialGradient id="bSkinH" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#FFF0E6"/>
      <stop offset="100%" stop-color="#FFE4C4"/>
    </radialGradient>
    <linearGradient id="bHairH" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#2C2C54"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
    <radialGradient id="bBlushH" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF9999" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FF9999" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Body -->
  <path d="M38 82 Q34 96 30 114 L90 114 Q86 96 82 82 Z" fill="#B8D4F0" stroke="#90B8D8" stroke-width="0.5" stroke-linejoin="round"/>
  <ellipse cx="60" cy="80" rx="16" ry="6" fill="white" stroke="#E0D8D0" stroke-width="0.4"/>
  <rect x="55" y="70" width="10" height="12" rx="4" fill="url(#bSkinH)"/>

  <!-- Head -->
  <circle cx="60" cy="40" r="34" fill="url(#bSkinH)"/>

  <!-- Hair (same structure as neutral) -->
  <path d="M26 38 Q24 10 38 2 Q50 -4 60 -5 Q70 -4 82 2 Q96 10 94 38 Q96 52 94 64 L91 62 Q92 50 92 40 Q92 16 80 6 Q70 -1 60 -2 Q50 -1 40 6 Q28 16 28 40 Q28 50 29 62 L26 64 Q24 52 26 38 Z" fill="url(#bHairH)"/>
  <path d="M28 34 Q26 16 38 6 Q46 0 54 -3 L50 6 Q40 14 36 28 Q32 40 32 54 Q30 58 28 56 Q26 46 28 34 Z" fill="url(#bHairH)"/>
  <path d="M28 54 Q24 60 26 64 Q30 66 33 60 Q34 56 32 54" fill="#1A1A2E"/>
  <path d="M92 34 Q94 16 82 6 Q74 0 66 -3 L70 6 Q80 14 84 28 Q88 40 88 54 Q90 58 92 56 Q94 46 92 34 Z" fill="url(#bHairH)"/>
  <path d="M92 54 Q96 60 94 64 Q90 66 87 60 Q86 56 88 54" fill="#1A1A2E"/>
  <path d="M30 22 Q34 4 48 -2 Q54 -5 60 -6 Q66 -5 72 -2 Q86 4 90 22 Q80 8 60 2 Q40 8 30 22 Z" fill="#2C2C54"/>

  <!-- Headband + bow -->
  <path d="M28 22 Q34 6 48 -1 Q54 -5 60 -6 Q66 -5 72 -1 Q86 6 92 22" fill="none" stroke="#E63946" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M60 -4 Q52 -12 50 -6 Q48 0 54 4 Q58 0 60 -4 Z" fill="#E63946"/>
  <path d="M60 -4 Q68 -12 70 -6 Q72 0 66 4 Q62 0 60 -4 Z" fill="#E63946"/>
  <circle cx="60" cy="-4" r="2.5" fill="#F04858"/>

  <!-- Happy eyes (^_^) - thick cute arcs -->
  <path d="M38 46 Q48 35 58 46" fill="none" stroke="#4A3728" stroke-width="3" stroke-linecap="round"/>
  <path d="M62 46 Q72 35 82 46" fill="none" stroke="#4A3728" stroke-width="3" stroke-linecap="round"/>
  <!-- Lashes on closed eyes -->
  <line x1="39" y1="45" x2="36" y2="41" stroke="#4A3728" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="81" y1="45" x2="84" y2="41" stroke="#4A3728" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Nose -->
  <circle cx="60" cy="55" r="1.2" fill="#E8C0A8"/>

  <!-- Cheek blush (bigger when happy) -->
  <circle cx="34" cy="54" r="10" fill="url(#bBlushH)"/>
  <circle cx="86" cy="54" r="10" fill="url(#bBlushH)"/>

  <!-- Big happy smile -->
  <path d="M48 58 Q54 67 60 68 Q66 67 72 58" fill="#F0A0A0" stroke="#E07A7A" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Sparkles -->
  <g transform="translate(18,16)" opacity="0.6">
    <line x1="0" y1="-3.5" x2="0" y2="3.5" stroke="#FFD700" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-3.5" y1="0" x2="3.5" y2="0" stroke="#FFD700" stroke-width="1.2" stroke-linecap="round"/>
  </g>
  <g transform="translate(102,14)" opacity="0.5">
    <line x1="0" y1="-2.5" x2="0" y2="2.5" stroke="#FFD700" stroke-width="1" stroke-linecap="round"/>
    <line x1="-2.5" y1="0" x2="2.5" y2="0" stroke="#FFD700" stroke-width="1" stroke-linecap="round"/>
  </g>
  <circle cx="14" cy="50" r="1.2" fill="#FFD700" opacity="0.4"/>

  <!-- Arms raised -->
  <path d="M36 84 Q26 76 22 70" fill="none" stroke="#FFE4C4" stroke-width="5" stroke-linecap="round"/>
  <path d="M84 84 Q94 76 98 70" fill="none" stroke="#FFE4C4" stroke-width="5" stroke-linecap="round"/>
</svg>