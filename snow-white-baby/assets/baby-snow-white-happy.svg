  <path d="M60 3 Q52 -4 50 0 Q48 4 54 7 Q58 4 60 3 Z" fill="#DD2244"/>
  <path d="M60 3 Q68 -4 70 0 Q72 4 66 7 Q62 4 60 3 Z" fill="#DD2244"/>
  <circle cx="60" cy="3" r="2.5" fill="#EE3355"/>

  <!-- Eyebrows raised -->
  <path d="M39 29 Q44 27 51 28" fill="none" stroke="#2A2A3E" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>
  <path d="M69 28 Q76 27 81 29" fill="none" stroke="#2A2A3E" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>

  <!-- Happy eyes (^_^) closed arcs -->
