<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <radialGradient id="bSkinA" cx="50%" cy="42%" r="50%">
      <stop offset="0%" stop-color="#FFF8F5"/>
      <stop offset="100%" stop-color="#FFE8DD"/>
    </radialGradient>
    <linearGradient id="bHairA" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#1C1C30"/>
      <stop offset="100%" stop-color="#0A0A18"/>
    </linearGradient>
    <radialGradient id="purpleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#CC66FF"/>
      <stop offset="60%" stop-color="#9933CC"/>
      <stop offset="100%" stop-color="#6600AA"/>
    </radialGradient>
    <radialGradient id="outerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#CC66FF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#9933CC" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="darkAura" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#6600AA" stop-opacity="0.1"/>
    </radialGradient>
  </defs>

  <!-- Dark aura -->
  <circle cx="60" cy="52" r="58" fill="url(#darkAura)"/>

  <!-- Onesie body -->
  <path d="M36 80 Q33 95 30 115 L90 115 Q87 95 84 80 Z" fill="#6CA8E8" stroke="#5090D0" stroke-width="0.5"/>
  <path d="M42 78 Q48 73 60 72 Q72 73 78 78 Q72 82 60 84 Q48 82 42 78 Z" fill="white" stroke="#E8E8E8" stroke-width="0.4"/>

  <rect x="55" y="68" width="10" height="10" rx="3" fill="url(#bSkinA)"/>

  <!-- Head -->
  <circle cx="60" cy="42" r="32" fill="url(#bSkinA)" stroke="#F0D0C0" stroke-width="0.3"/>

  <!-- Hair (spikier when angry) -->
  <path d="M30 38 Q28 15 42 8 Q52 2 60 1 Q68 2 78 8 Q92 15 90 38 Q92 50 90 60 L87 58 Q88 48 88 40 Q88 20 76 12 Q66 5 60 4 Q54 5 44 12 Q32 20 32 40 Q32 48 33 58 L30 60 Q28 50 30 38 Z" fill="url(#bHairA)"/>
  <path d="M32 36 Q30 22 40 12 Q48 6 56 4 L52 12 Q42 18 38 30 Q34 40 34 52 Q32 56 30 54 Q30 44 32 36 Z" fill="url(#bHairA)"/>
  <path d="M88 36 Q90 22 80 12 Q72 6 64 4 L68 12 Q78 18 82 30 Q86 40 86 52 Q88 56 90 54 Q90 44 88 36 Z" fill="url(#bHairA)"/>
  <path d="M34 28 Q36 10 50 4 Q56 1 60 0 Q64 1 70 4 Q84 10 86 28 Q76 14 60 10 Q44 14 34 28 Z" fill="#1C1C30"/>
  <!-- Spiky curls -->
  <path d="M30 53 Q24 56 26 62 Q30 66 34 58 Q36 52 34 50" fill="#0A0A18"/>
  <path d="M90 53 Q96 56 94 62 Q90 66 86 58 Q84 52 86 50" fill="#0A0A18"/>

  <!-- Headband -->
  <path d="M32 25 Q36 12 48 6 Q54 2 60 1 Q66 2 72 6 Q84 12 88 25" fill="none" stroke="#DD2244" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M60 3 Q52 -4 50 0 Q48 4 54 7 Q58 4 60 3 Z" fill="#DD2244"/>
  <path d="M60 3 Q68 -4 70 0 Q72 4 66 7 Q62 4 60 3 Z" fill="#DD2244"/>
  <circle cx="60" cy="3" r="2.5" fill="#EE3355"/>

  <!-- Angry eyebrows V-shape -->
  <path d="M38 30 Q44 35 52 32" fill="none" stroke="#1A1A2E" stroke-width="2" stroke-linecap="round"/>
  <path d="M68 32 Q76 35 82 30" fill="none" stroke="#1A1A2E" stroke-width="2" stroke-linecap="round"/>
  <!-- Forehead crease -->
  <path d="M55 30 Q60 32 65 30" fill="none" stroke="#F0D0C0" stroke-width="0.6" opacity="0.5"/>

  <!-- Purple glowing eyes (magic mirror curse) -->
  <ellipse cx="47" cy="43" rx="11" ry="11" fill="url(#outerGlow)"/>
  <ellipse cx="73" cy="43" rx="11" ry="11" fill="url(#outerGlow)"/>

  <!-- Left eye -->
  <ellipse cx="47" cy="43" rx="9" ry="9" fill="#1A0A2E" stroke="#9933CC" stroke-width="0.8"/>
  <circle cx="47" cy="43" r="5.5" fill="url(#purpleGlow)"/>
  <circle cx="47" cy="43" r="2.5" fill="#E0AAFF"/>
  <circle cx="44" cy="40" r="2" fill="white" opacity="0.65"/>
  <circle cx="50" cy="46" r="0.8" fill="#E0AAFF" opacity="0.5"/>

  <!-- Right eye -->
  <ellipse cx="73" cy="43" rx="9" ry="9" fill="#1A0A2E" stroke="#9933CC" stroke-width="0.8"/>
  <circle cx="73" cy="43" r="5.5" fill="url(#purpleGlow)"/>
  <circle cx="73" cy="43" r="2.5" fill="#E0AAFF"/>
  <circle cx="70" cy="40" r="2" fill="white" opacity="0.65"/>
  <circle cx="76" cy="46" r="0.8" fill="#E0AAFF" opacity="0.5"/>

  <!-- Purple energy sparks -->
  <line x1="34" y1="38" x2="30" y2="34" stroke="#CC66FF" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="33" y1="44" x2="28" y2="44" stroke="#CC66FF" stroke-width="0.8" stroke-linecap="round" opacity="0.35"/>
  <line x1="86" y1="38" x2="90" y2="34" stroke="#CC66FF" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="87" y1="44" x2="92" y2="44" stroke="#CC66FF" stroke-width="0.8" stroke-linecap="round" opacity="0.35"/>

  <!-- Nose -->
  <circle cx="60" cy="52" r="1.8" fill="#FFD0C0"/>

  <!-- Flushed cheeks (still cute) -->
  <ellipse cx="34" cy="53" rx="9" ry="6" fill="#FF9999" opacity="0.55"/>
  <ellipse cx="86" cy="53" rx="9" ry="6" fill="#FF9999" opacity="0.55"/>

  <!-- Tiny angry pout -->
  <path d="M55 60 Q57.5 57.5 60 58 Q62.5 57.5 65 60" fill="none" stroke="#CC5555" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M56 60 Q58 58.5 60 58.5 Q62 58.5 64 60" fill="#E08888" opacity="0.35"/>

  <!-- Fists raised -->
  <path d="M34 84 Q24 78 20 72" fill="none" stroke="#FFE8DD" stroke-width="6" stroke-linecap="round"/>
  <path d="M86 84 Q96 78 100 72" fill="none" stroke="#FFE8DD" stroke-width="6" stroke-linecap="round"/>
  <circle cx="18" cy="70" r="4" fill="#FFE8DD" stroke="#F0D0C0" stroke-width="0.4"/>
  <circle cx="102" cy="70" r="4" fill="#FFE8DD" stroke="#F0D0C0" stroke-width="0.4"/>

  <!-- Magic particles -->
  <circle cx="14" cy="32" r="1.5" fill="#CC66FF" opacity="0.35">
    <animate attributeName="opacity" values="0.35;0.1;0.35" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="106" cy="28" r="1" fill="#9933CC" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="8" cy="52" r="1.2" fill="#CC66FF" opacity="0.25">
    <animate attributeName="opacity" values="0.25;0;0.25" dur="1.8s" repeatCount="indefinite"/>
  </circle>
</svg>