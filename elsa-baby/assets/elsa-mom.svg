<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <defs>
    <linearGradient id="dressGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#81D4FA"/>
      <stop offset="40%" stop-color="#4FC3F7"/>
      <stop offset="100%" stop-color="#0288D1"/>
    </linearGradient>
    <linearGradient id="capeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(129,212,250,0.5)"/>
      <stop offset="100%" stop-color="rgba(79,195,247,0.15)"/>
    </linearGradient>
    <radialGradient id="skinGrad" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#FFF5F0"/>
      <stop offset="100%" stop-color="#FFE8E0"/>
    </radialGradient>
    <linearGradient id="hairGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#FFF8DC"/>
      <stop offset="30%" stop-color="#F5E6A0"/>
      <stop offset="100%" stop-color="#E8D280"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Cape (behind body) -->
  <path d="M60,120 Q40,200 55,280 L145,280 Q160,200 140,120" fill="url(#capeGrad)" opacity="0.6"/>
  <!-- Cape snowflake decorations -->
  <text x="75" y="220" font-size="12" fill="rgba(255,255,255,0.3)" text-anchor="middle">❄</text>
  <text x="125" y="240" font-size="10" fill="rgba(255,255,255,0.25)" text-anchor="middle">❄</text>
  <text x="100" y="260" font-size="14" fill="rgba(255,255,255,0.2)" text-anchor="middle">❄</text>

  <!-- Braid (behind body, over left shoulder) -->
  <!-- Braid segments -->
  <ellipse cx="62" cy="145" rx="7" ry="10" fill="#F0DC80" transform="rotate(-8,62,145)"/>
  <ellipse cx="59" cy="162" rx="6.5" ry="9" fill="#F5E6A0" transform="rotate(-5,59,162)"/>
  <ellipse cx="57" cy="178" rx="6" ry="8.5" fill="#F0DC80" transform="rotate(-3,57,178)"/>
  <ellipse cx="56" cy="193" rx="5.5" ry="8" fill="#F5E6A0"/>
  <ellipse cx="55" cy="207" rx="5" ry="7.5" fill="#F0DC80"/>
  <ellipse cx="55" cy="220" rx="4.5" ry="7" fill="#F5E6A0"/>
  <!-- Braid tie -->
  <circle cx="55" cy="228" r="4" fill="#B3E5FC" stroke="#4FC3F7" stroke-width="1"/>

  <!-- Dress body -->
  <path d="M65,130 Q60,160 55,220 L55,280 L145,280 L145,220 Q140,160 135,130 Q120,118 100,116 Q80,118 65,130Z" fill="url(#dressGrad)"/>

  <!-- Crystallized bodice detail -->
  <path d="M72,130 L100,145 L128,130 Q120,120 100,116 Q80,120 72,130Z" fill="#29B6F6" opacity="0.6"/>
  <path d="M78,128 L100,140 L122,128" stroke="rgba(255,255,255,0.3)" stroke-width="1" fill="none"/>

  <!-- Off-shoulder neckline -->
  <path d="M65,120 Q80,112 100,110 Q120,112 135,120" stroke="#81D4FA" stroke-width="2" fill="none"/>

  <!-- Dress shimmer highlights -->
  <ellipse cx="85" cy="160" rx="8" ry="20" fill="rgba(255,255,255,0.08)" transform="rotate(-5,85,160)"/>
  <ellipse cx="118" cy="200" rx="6" ry="15" fill="rgba(255,255,255,0.06)" transform="rotate(5,118,200)"/>

  <!-- Snowflake on bodice -->
  <text x="100" y="170" font-size="14" fill="rgba(255,255,255,0.25)" text-anchor="middle">❄</text>

  <!-- Translucent sleeves -->
  <ellipse cx="62" cy="128" rx="12" ry="8" fill="rgba(129,212,250,0.35)" transform="rotate(-15,62,128)"/>
  <ellipse cx="138" cy="128" rx="12" ry="8" fill="rgba(129,212,250,0.35)" transform="rotate(15,138,128)"/>

  <!-- Neck -->
  <rect x="93" y="98" width="14" height="18" rx="4" fill="url(#skinGrad)"/>

  <!-- Head -->
  <ellipse cx="100" cy="72" rx="34" ry="38" fill="url(#skinGrad)"/>

  <!-- Jaw / chin (more pointed, Disney style) -->
  <path d="M72,80 Q78,105 100,112 Q122,105 128,80" fill="url(#skinGrad)"/>

  <!-- Hair back volume -->
  <ellipse cx="100" cy="50" rx="38" ry="32" fill="url(#hairGrad)"/>

  <!-- Hair swept back top -->
  <path d="M64,58 Q66,24 90,18 Q110,14 130,22 Q145,32 142,55 L138,48 Q130,30 110,26 Q90,24 76,36 Q68,46 66,58Z" fill="#EDD98A"/>

  <!-- Side-swept bangs (Elsa signature) -->
  <path d="M66,55 Q72,35 92,28 Q102,26 108,30 Q100,38 88,42 Q76,48 68,58Z" fill="#F5E6A0"/>
  <!-- Bangs highlight -->
  <path d="M72,48 Q80,36 95,30 Q90,38 82,44Z" fill="#FFF8DC" opacity="0.5"/>

  <!-- Small wisp on forehead -->
  <path d="M94,42 Q97,38 100,42" stroke="#E8D280" stroke-width="1.5" fill="none"/>

  <!-- Side hair (right) -->
  <ellipse cx="136" cy="72" rx="8" ry="22" fill="#EDD98A" transform="rotate(5,136,72)"/>

  <!-- Side hair (left, shorter - braid starts here) -->
  <ellipse cx="64" cy="68" rx="6" ry="18" fill="#EDD98A" transform="rotate(-5,64,68)"/>

  <!-- Braid start connection -->
  <path d="M64,85 Q58,100 60,120 Q62,130 62,140" stroke="#F0DC80" stroke-width="12" fill="none" stroke-linecap="round"/>

  <!-- Eyes - large, Disney style, deep sky blue -->
  <!-- Left eye -->
  <ellipse cx="86" cy="72" rx="10" ry="11" fill="white"/>
  <ellipse cx="86" cy="73" rx="8" ry="9" fill="#4FC3F7"/>
  <ellipse cx="86" cy="73" rx="6" ry="7" fill="#29B6F6"/>
  <circle cx="86" cy="74" r="4" fill="#01579B"/>
  <circle cx="83" cy="70" r="2.5" fill="white"/>
  <circle cx="89" cy="76" r="1.2" fill="white"/>
  <!-- Left upper eyelid -->
  <path d="M76,68 Q82,62 96,68" stroke="#5D4037" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Left eyelashes -->
  <line x1="77" y1="68" x2="74" y2="64" stroke="#5D4037" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="80" y1="65" x2="78" y2="61" stroke="#5D4037" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="84" y1="63" x2="83" y2="59" stroke="#5D4037" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Left lower lash line -->
  <path d="M78,80 Q86,83 94,80" stroke="#8D6E63" stroke-width="0.8" fill="none"/>

  <!-- Right eye -->
  <ellipse cx="114" cy="72" rx="10" ry="11" fill="white"/>
  <ellipse cx="114" cy="73" rx="8" ry="9" fill="#4FC3F7"/>
  <ellipse cx="114" cy="73" rx="6" ry="7" fill="#29B6F6"/>
  <circle cx="114" cy="74" r="4" fill="#01579B"/>
  <circle cx="111" cy="70" r="2.5" fill="white"/>
  <circle cx="117" cy="76" r="1.2" fill="white"/>
  <!-- Right upper eyelid -->
  <path d="M104,68 Q110,62 124,68" stroke="#5D4037" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Right eyelashes -->
  <line x1="123" y1="68" x2="126" y2="64" stroke="#5D4037" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="120" y1="65" x2="122" y2="61" stroke="#5D4037" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="116" y1="63" x2="117" y2="59" stroke="#5D4037" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Right lower lash line -->
  <path d="M106,80 Q114,83 122,80" stroke="#8D6E63" stroke-width="0.8" fill="none"/>

  <!-- Eyebrows - elegant arched -->
  <path d="M76,60 Q84,54 94,58" stroke="#C8A84E" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M106,58 Q116,54 124,60" stroke="#C8A84E" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- Nose - small, delicate -->
  <path d="M98,82 Q100,86 102,84" stroke="#E0B0A0" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Freckles (very subtle) -->
  <circle cx="82" cy="82" r="0.8" fill="#E0C8B8" opacity="0.5"/>
  <circle cx="85" cy="84" r="0.6" fill="#E0C8B8" opacity="0.4"/>
  <circle cx="115" cy="82" r="0.8" fill="#E0C8B8" opacity="0.5"/>
  <circle cx="118" cy="84" r="0.6" fill="#E0C8B8" opacity="0.4"/>

  <!-- Lips - thin, rosy pink -->
  <!-- Upper lip -->
  <path d="M93,92 Q96,89 100,90 Q104,89 107,92 Q104,93 100,93.5 Q96,93 93,92Z" fill="#D4727A"/>
  <!-- Lower lip -->
  <path d="M94,93 Q100,98 106,93 Q104,94 100,94.5 Q96,94 94,93Z" fill="#E08888"/>
  <!-- Lip highlight -->
  <ellipse cx="100" cy="91" rx="2.5" ry="0.8" fill="rgba(255,255,255,0.3)"/>

  <!-- Blush -->
  <ellipse cx="78" cy="82" rx="8" ry="4" fill="rgba(255,160,180,0.15)"/>
  <ellipse cx="122" cy="82" rx="8" ry="4" fill="rgba(255,160,180,0.15)"/>

  <!-- Tiara / ice crystal crown -->
  <g filter="url(#glow)">
    <path d="M80,38 L84,28 L90,34 L95,22 L100,18 L105,22 L110,34 L116,28 L120,38" fill="#B3E5FC" stroke="#4FC3F7" stroke-width="1.2"/>
    <!-- Center gem -->
    <circle cx="100" cy="26" r="3.5" fill="#E1F5FE"/>
    <circle cx="100" cy="26" r="2" fill="#4FC3F7"/>
    <circle cx="99" cy="25" r="0.8" fill="white"/>
    <!-- Side gems -->
    <circle cx="90" cy="32" r="1.8" fill="#E1F5FE"/>
    <circle cx="110" cy="32" r="1.8" fill="#E1F5FE"/>
  </g>
</svg>
