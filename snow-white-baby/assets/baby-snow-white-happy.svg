  <line x1="38" y1="42" x2="36" y2="39" stroke="#1A1A2E" stroke-width="1" stroke-linecap="round"/>
  <line x1="82" y1="42" x2="84" y2="39" stroke="#1A1A2E" stroke-width="1" stroke-linecap="round"/>

  <!-- Nose -->
