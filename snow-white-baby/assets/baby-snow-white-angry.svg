<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <radialGradient id="bSkinA" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#FFF0E6"/>
      <stop offset="100%" stop-color="#FFE4C4"/>
    </radialGradient>
    <linearGradient id="bHairA" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#2C2C54"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
    <radialGradient id="purpleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#BB66EE"/>
      <stop offset="60%" stop-color="#8833BB"/>
      <stop offset="100%" stop-color="#5500AA"/>
    </radialGradient>
    <radialGradient id="outerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#BB66EE" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8833BB" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bBlushA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF8888" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FF8888" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Subtle dark aura -->
  <circle cx="60" cy="50" r="58" fill="none" stroke="#5500AA" stroke-width="0.5" opacity="0.15"/>

  <!-- Body -->
  <path d="M38 82 Q34 96 30 114 L90 114 Q86 96 82 82 Z" fill="#B8D4F0" stroke="#90B8D8" stroke-width="0.5" stroke-linejoin="round"/>
  <ellipse cx="60" cy="80" rx="16" ry="6" fill="white" stroke="#E0D8D0" stroke-width="0.4"/>
  <rect x="55" y="70" width="10" height="12" rx="4" fill="url(#bSkinA)"/>

  <!-- Head -->
  <circle cx="60" cy="40" r="34" fill="url(#bSkinA)"/>

  <!-- Hair -->
  <path d="M26 38 Q24 10 38 2 Q50 -4 60 -5 Q70 -4 82 2 Q96 10 94 38 Q96 52 94 64 L91 62 Q92 50 92 40 Q92 16 80 6 Q70 -1 60 -2 Q50 -1 40 6 Q28 16 28 40 Q28 50 29 62 L26 64 Q24 52 26 38 Z" fill="url(#bHairA)"/>
  <path d="M28 34 Q26 16 38 6 Q46 0 54 -3 L50 6 Q40 14 36 28 Q32 40 32 54 Q30 58 28 56 Q26 46 28 34 Z" fill="url(#bHairA)"/>
  <path d="M28 54 Q24 60 26 64 Q30 66 33 60 Q34 56 32 54" fill="#1A1A2E"/>
  <path d="M92 34 Q94 16 82 6 Q74 0 66 -3 L70 6 Q80 14 84 28 Q88 40 88 54 Q90 58 92 56 Q94 46 92 34 Z" fill="url(#bHairA)"/>
  <path d="M92 54 Q96 60 94 64 Q90 66 87 60 Q86 56 88 54" fill="#1A1A2E"/>
  <path d="M30 22 Q34 4 48 -2 Q54 -5 60 -6 Q66 -5 72 -2 Q86 4 90 22 Q80 8 60 2 Q40 8 30 22 Z" fill="#2C2C54"/>

  <!-- Headband + bow -->
  <path d="M28 22 Q34 6 48 -1 Q54 -5 60 -6 Q66 -5 72 -1 Q86 6 92 22" fill="none" stroke="#E63946" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M60 -4 Q52 -12 50 -6 Q48 0 54 4 Q58 0 60 -4 Z" fill="#E63946"/>
  <path d="M60 -4 Q68 -12 70 -6 Q72 0 66 4 Q62 0 60 -4 Z" fill="#E63946"/>
  <circle cx="60" cy="-4" r="2.5" fill="#F04858"/>

  <!-- Angry eyebrows V-shape -->
  <path d="M38 36 Q44 40 52 37" fill="none" stroke="#4A3728" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M68 37 Q76 40 82 36" fill="none" stroke="#4A3728" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Eye glow auras -->
  <circle cx="48" cy="46" r="14" fill="url(#outerGlow)"/>
  <circle cx="72" cy="46" r="14" fill="url(#outerGlow)"/>

  <!-- Left eye (purple magic) -->
  <ellipse cx="48" cy="46" rx="9" ry="10" fill="#1A0A2E" stroke="#8833BB" stroke-width="0.8"/>
  <circle cx="48" cy="46" r="6" fill="url(#purpleGlow)"/>
  <circle cx="48" cy="46" r="2.5" fill="#DDAAFF"/>
  <circle cx="45" cy="43" r="2" fill="white" opacity="0.6"/>

  <!-- Right eye -->
  <ellipse cx="72" cy="46" rx="9" ry="10" fill="#1A0A2E" stroke="#8833BB" stroke-width="0.8"/>
  <circle cx="72" cy="46" r="6" fill="url(#purpleGlow)"/>
  <circle cx="72" cy="46" r="2.5" fill="#DDAAFF"/>
  <circle cx="69" cy="43" r="2" fill="white" opacity="0.6"/>

  <!-- Purple sparks -->
  <line x1="34" y1="42" x2="30" y2="38" stroke="#BB66EE" stroke-width="1" stroke-linecap="round" opacity="0.45"/>
  <line x1="86" y1="42" x2="90" y2="38" stroke="#BB66EE" stroke-width="1" stroke-linecap="round" opacity="0.45"/>

  <!-- Nose -->
  <circle cx="60" cy="55" r="1.2" fill="#E8C0A8"/>

  <!-- Flushed cheeks -->
  <circle cx="36" cy="54" r="8" fill="url(#bBlushA)"/>
  <circle cx="84" cy="54" r="8" fill="url(#bBlushA)"/>

  <!-- Angry pout -->
  <path d="M55 60 Q58 58 60 58.5 Q62 58 65 60" fill="none" stroke="#C06060" stroke-width="1" stroke-linecap="round"/>

  <!-- Fists -->
  <path d="M36 84 Q26 78 22 72" fill="none" stroke="#FFE4C4" stroke-width="5" stroke-linecap="round"/>
  <path d="M84 84 Q94 78 98 72" fill="none" stroke="#FFE4C4" stroke-width="5" stroke-linecap="round"/>
  <circle cx="20" cy="70" r="3.5" fill="#FFE4C4" stroke="#E8C8A8" stroke-width="0.4"/>
  <circle cx="100" cy="70" r="3.5" fill="#FFE4C4" stroke="#E8C8A8" stroke-width="0.4"/>

  <!-- Magic particles -->
  <circle cx="14" cy="30" r="1.2" fill="#BB66EE" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="106" cy="26" r="1" fill="#8833BB" opacity="0.25">
    <animate attributeName="opacity" values="0.25;0.05;0.25" dur="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>