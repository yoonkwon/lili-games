<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <radialGradient id="bSkin" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#FFF0E6"/>
      <stop offset="100%" stop-color="#FFE4C4"/>
    </radialGradient>
    <linearGradient id="bHair" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#2C2C54"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
    <linearGradient id="bEyeShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5A2D0C"/>
      <stop offset="50%" stop-color="#8B4513"/>
      <stop offset="100%" stop-color="#A0622A"/>
    </linearGradient>
    <radialGradient id="bBlush" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF9999" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FF9999" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Body (tiny, simple onesie) -->
  <path d="M38 82 Q34 96 30 114 L90 114 Q86 96 82 82 Z" fill="#B8D4F0" stroke="#90B8D8" stroke-width="0.5" stroke-linejoin="round"/>
  <!-- White collar -->
  <ellipse cx="60" cy="80" rx="16" ry="6" fill="white" stroke="#E0D8D0" stroke-width="0.4"/>

  <!-- Neck -->
  <rect x="55" y="70" width="10" height="12" rx="4" fill="url(#bSkin)"/>

  <!-- Head (big circle, 2:1 ratio) -->
  <circle cx="60" cy="40" r="34" fill="url(#bSkin)"/>

  <!-- Hair (back) -->
  <path d="M26 38 Q24 10 38 2 Q50 -4 60 -5 Q70 -4 82 2 Q96 10 94 38 Q96 52 94 64 L91 62 Q92 50 92 40 Q92 16 80 6 Q70 -1 60 -2 Q50 -1 40 6 Q28 16 28 40 Q28 50 29 62 L26 64 Q24 52 26 38 Z" fill="url(#bHair)"/>
  <!-- Left side -->
  <path d="M28 34 Q26 16 38 6 Q46 0 54 -3 L50 6 Q40 14 36 28 Q32 40 32 54 Q30 58 28 56 Q26 46 28 34 Z" fill="url(#bHair)"/>
  <!-- Left curl -->
  <path d="M28 54 Q24 60 26 64 Q30 66 33 60 Q34 56 32 54" fill="#1A1A2E"/>
  <!-- Right side -->
  <path d="M92 34 Q94 16 82 6 Q74 0 66 -3 L70 6 Q80 14 84 28 Q88 40 88 54 Q90 58 92 56 Q94 46 92 34 Z" fill="url(#bHair)"/>
  <!-- Right curl -->
  <path d="M92 54 Q96 60 94 64 Q90 66 87 60 Q86 56 88 54" fill="#1A1A2E"/>
  <!-- Top dome -->
  <path d="M30 22 Q34 4 48 -2 Q54 -5 60 -6 Q66 -5 72 -2 Q86 4 90 22 Q80 8 60 2 Q40 8 30 22 Z" fill="#2C2C54"/>

  <!-- Red headband -->
  <path d="M28 22 Q34 6 48 -1 Q54 -5 60 -6 Q66 -5 72 -1 Q86 6 92 22" fill="none" stroke="#E63946" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Mini bow -->
  <path d="M60 -4 Q52 -12 50 -6 Q48 0 54 4 Q58 0 60 -4 Z" fill="#E63946"/>
  <path d="M60 -4 Q68 -12 70 -6 Q72 0 66 4 Q62 0 60 -4 Z" fill="#E63946"/>
  <circle cx="60" cy="-4" r="2.5" fill="#F04858"/>

  <!-- ===== FACE (features low, clustered) ===== -->
  <!-- Eyes at ~y=44, well below center(40) -->

  <!-- Soft eyebrows -->
  <path d="M40 38 Q44 36 50 37" fill="none" stroke="#4A3728" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <path d="M70 37 Q76 36 80 38" fill="none" stroke="#4A3728" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>

  <!-- Left eye -->
  <ellipse cx="48" cy="46" rx="10" ry="11" fill="#FFF8F0"/>
  <ellipse cx="49" cy="47" rx="7.5" ry="8.5" fill="url(#bEyeShade)"/>
  <circle cx="49" cy="48" r="4" fill="#2D1B0E"/>
  <circle cx="45" cy="42" r="3.5" fill="white" opacity="0.95"/>
  <circle cx="53" cy="51" r="1.8" fill="white" opacity="0.65"/>
  <circle cx="47" cy="46" r="0.7" fill="white" opacity="0.4"/>
  <path d="M38 42 Q44 36 49 35 Q54 36 58 42" stroke="#4A3728" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <line x1="39" y1="41" x2="37" y2="37" stroke="#4A3728" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="42" y1="38" x2="41" y2="35" stroke="#4A3728" stroke-width="1" stroke-linecap="round"/>

  <!-- Right eye -->
  <ellipse cx="72" cy="46" rx="10" ry="11" fill="#FFF8F0"/>
  <ellipse cx="71" cy="47" rx="7.5" ry="8.5" fill="url(#bEyeShade)"/>
  <circle cx="71" cy="48" r="4" fill="#2D1B0E"/>
  <circle cx="67" cy="42" r="3.5" fill="white" opacity="0.95"/>
  <circle cx="75" cy="51" r="1.8" fill="white" opacity="0.65"/>
  <circle cx="69" cy="46" r="0.7" fill="white" opacity="0.4"/>
  <path d="M62 42 Q67 36 71 35 Q76 36 82 42" stroke="#4A3728" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <line x1="81" y1="41" x2="83" y2="37" stroke="#4A3728" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="78" y1="38" x2="79" y2="35" stroke="#4A3728" stroke-width="1" stroke-linecap="round"/>

  <!-- Nose (tiny dot) -->
  <circle cx="60" cy="55" r="1.2" fill="#E8C0A8"/>

  <!-- Cheek blush -->
  <circle cx="36" cy="54" r="8" fill="url(#bBlush)"/>
  <circle cx="84" cy="54" r="8" fill="url(#bBlush)"/>

  <!-- Tiny mouth (close to nose) -->
  <path d="M56 60 Q58 58.5 60 59 Q62 58.5 64 60" fill="none" stroke="#E07A7A" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M57 60 Q59 62 60 62.2 Q61 62 63 60" fill="#E07A7A" opacity="0.6"/>

  <!-- Little arms -->
  <path d="M36 86 Q28 92 26 98" fill="none" stroke="#FFE4C4" stroke-width="5" stroke-linecap="round"/>
  <path d="M84 86 Q92 92 94 98" fill="none" stroke="#FFE4C4" stroke-width="5" stroke-linecap="round"/>
</svg>