<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <radialGradient id="babySkin" cx="0.5" cy="0.45" r="0.5">
      <stop offset="0%" stop-color="#F0F0FF"/>
      <stop offset="100%" stop-color="#E0E8FF"/>
    </radialGradient>
    <filter id="iceGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="60" cy="60" r="45" fill="url(#babySkin)"/>
  <!-- Hair tuft (slightly icy) -->
  <path d="M42,22 Q48,8 60,6 Q72,8 78,22 Q72,14 60,12 Q48,14 42,22Z" fill="#E8E0C0"/>
  <path d="M30,35 Q28,28 35,24 Q32,30 32,36Z" fill="#E0D8B0"/>
  <path d="M90,35 Q92,28 85,24 Q88,30 88,36Z" fill="#E0D8B0"/>
  <!-- Angry glowing eyes -->
  <g filter="url(#iceGlow)">
    <circle cx="47" cy="56" r="8" fill="#4FC3F7"/>
    <circle cx="73" cy="56" r="8" fill="#4FC3F7"/>
  </g>
  <circle cx="47" cy="56" r="4" fill="white" opacity="0.8"/>
  <circle cx="73" cy="56" r="4" fill="white" opacity="0.8"/>
  <!-- Angry eyebrows -->
  <line x1="36" y1="42" x2="54" y2="46" stroke="#4A6080" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="84" y1="42" x2="66" y2="46" stroke="#4A6080" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Cheeks (icy tint) -->
  <ellipse cx="36" cy="66" rx="8" ry="5" fill="rgba(79,195,247,0.2)"/>
  <ellipse cx="84" cy="66" rx="8" ry="5" fill="rgba(79,195,247,0.2)"/>
  <!-- Nose -->
  <circle cx="60" cy="65" r="2" fill="rgba(200,200,220,0.4)"/>
  <!-- Angry mouth -->
  <path d="M50,78 Q56,72 60,72 Q64,72 70,78" stroke="#90CAF9" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Ice crystals -->
  <text x="28" y="30" font-size="14" fill="#4FC3F7" opacity="0.6" text-anchor="middle">❄</text>
  <text x="92" y="26" font-size="12" fill="#4FC3F7" opacity="0.5" text-anchor="middle">❄</text>
  <text x="60" y="15" font-size="10" fill="#4FC3F7" opacity="0.4" text-anchor="middle">❄</text>
</svg>
