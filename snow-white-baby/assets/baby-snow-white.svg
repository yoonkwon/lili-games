<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <radialGradient id="babySkin" cx="0.5" cy="0.45" r="0.5">
      <stop offset="0%" stop-color="#FFF8F5"/>
      <stop offset="100%" stop-color="#FFE8E0"/>
    </radialGradient>
  </defs>

  <!-- Baby head/body (round, same as Elsa baby) -->
  <circle cx="60" cy="60" r="45" fill="url(#babySkin)"/>

  <!-- Hair - black bob tuft -->
  <path d="M42,22 Q48,8 60,6 Q72,8 78,22 Q72,14 60,12 Q48,14 42,22Z" fill="#1A1A2E"/>
  <!-- Side wisps -->
  <path d="M30,35 Q28,28 35,24 Q32,30 32,36Z" fill="#2C2C54"/>
  <path d="M90,35 Q92,28 85,24 Q88,30 88,36Z" fill="#2C2C54"/>
  <!-- Tiny red headband -->
  <path d="M36,26 Q44,12 60,8 Q76,12 84,26" fill="none" stroke="#CC2233" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Mini bow -->
  <path d="M60,10 Q54,4 52,8 Q54,12 58,12Z" fill="#CC2233"/>
  <path d="M60,10 Q66,4 68,8 Q66,12 62,12Z" fill="#CC2233"/>
  <circle cx="60" cy="10" r="2" fill="#DD3344"/>

  <!-- Eyes - big, round, warm brown -->
  <!-- Left eye -->
  <ellipse cx="47" cy="55" rx="9" ry="10" fill="white"/>
  <ellipse cx="47" cy="56" rx="7" ry="8" fill="#8B5E3C"/>
  <circle cx="47" cy="57" r="4" fill="#3A2010"/>
  <circle cx="44" cy="53" r="2.5" fill="white"/>
  <circle cx="49" cy="59" r="1" fill="white"/>

  <!-- Right eye -->
  <ellipse cx="73" cy="55" rx="9" ry="10" fill="white"/>
  <ellipse cx="73" cy="56" rx="7" ry="8" fill="#8B5E3C"/>
  <circle cx="73" cy="57" r="4" fill="#3A2010"/>
  <circle cx="70" cy="53" r="2.5" fill="white"/>
  <circle cx="75" cy="59" r="1" fill="white"/>

  <!-- Cheeks -->
  <ellipse cx="36" cy="68" rx="8" ry="5" fill="rgba(255,160,170,0.35)"/>
  <ellipse cx="84" cy="68" rx="8" ry="5" fill="rgba(255,160,170,0.35)"/>

  <!-- Nose -->
  <circle cx="60" cy="65" r="2" fill="rgba(230,180,160,0.4)"/>

  <!-- Mouth -->
  <path d="M52,74 Q56,80 60,80 Q64,80 68,74" stroke="#E07070" stroke-width="2" fill="rgba(240,140,140,0.3)" stroke-linecap="round"/>

  <!-- Tiny apple -->
  <text x="88" y="30" font-size="14" fill="#CC2233" opacity="0.5" text-anchor="middle">🍎</text>
</svg>