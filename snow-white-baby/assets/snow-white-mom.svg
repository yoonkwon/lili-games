<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <defs>
    <radialGradient id="skinGrad" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#FFF0E6"/>
      <stop offset="100%" stop-color="#FFE4C4"/>
    </radialGradient>
    <linearGradient id="hairGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#2C2C54"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1D3557"/>
      <stop offset="100%" stop-color="#14283E"/>
    </linearGradient>
    <linearGradient id="yellowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F9DC5C"/>
      <stop offset="100%" stop-color="#F0C830"/>
    </linearGradient>
    <linearGradient id="eyeShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5A2D0C"/>
      <stop offset="50%" stop-color="#8B4513"/>
      <stop offset="100%" stop-color="#A0622A"/>
    </linearGradient>
    <radialGradient id="blushGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF9999" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FF9999" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ========== BODY (small, simple) ========== -->

  <!-- Yellow skirt -->
  <path d="M62 200 Q54 235 46 272 L154 272 Q146 235 138 200 Z" fill="url(#yellowGrad)" stroke="#D4A820" stroke-width="0.8" stroke-linejoin="round"/>

  <!-- Blue bodice -->
  <path d="M74 170 L70 200 L130 200 L126 170 Q116 162 100 158 Q84 162 74 170 Z" fill="url(#blueGrad)" stroke="#0F1F2E" stroke-width="0.5" stroke-linejoin="round"/>

  <!-- White collar (simple rounded) -->
  <ellipse cx="100" cy="160" rx="22" ry="10" fill="white" stroke="#E0D8D0" stroke-width="0.5"/>

  <!-- Puffy sleeves -->
  <ellipse cx="66" cy="178" rx="18" ry="20" fill="#2A5080" stroke="#1A3858" stroke-width="0.5"/>
  <ellipse cx="134" cy="178" rx="18" ry="20" fill="#2A5080" stroke="#1A3858" stroke-width="0.5"/>
  <!-- Red sleeve bands -->
  <path d="M52 194 Q58 202 66 202 Q74 202 80 194" fill="none" stroke="#E63946" stroke-width="3" stroke-linecap="round"/>
  <path d="M120 194 Q126 202 134 202 Q142 202 148 194" fill="none" stroke="#E63946" stroke-width="3" stroke-linecap="round"/>

  <!-- Arms (simple, rounded) -->
  <path d="M52 200 Q48 218 50 232" fill="none" stroke="#FFE4C4" stroke-width="8" stroke-linecap="round"/>
  <path d="M148 200 Q152 218 150 232" fill="none" stroke="#FFE4C4" stroke-width="8" stroke-linecap="round"/>

  <!-- Neck -->
  <rect x="93" y="142" width="14" height="18" rx="5" fill="url(#skinGrad)"/>

  <!-- ========== HEAD (big circle, ~2.5 head ratio) ========== -->
  <circle cx="100" cy="82" r="60" fill="url(#skinGrad)"/>

  <!-- ========== HAIR (back layer) ========== -->
  <!-- Back hair volume -->
  <path d="M38 78 Q34 25 60 10 Q80 0 100 -2 Q120 0 140 10 Q166 25 162 78 Q164 110 162 140 L158 136 Q160 108 158 80 Q156 35 138 18 Q120 5 100 3 Q80 5 62 18 Q44 35 42 80 Q42 108 44 136 L40 140 Q38 110 38 78 Z" fill="url(#hairGrad)"/>

  <!-- Left side bob -->
  <path d="M42 72 Q38 40 56 20 Q68 8 82 2 L76 14 Q60 26 54 48 Q48 66 48 92 Q46 115 48 134 Q44 140 40 136 Q40 110 42 72 Z" fill="url(#hairGrad)"/>
  <!-- Left curl at tip -->
  <path d="M40 133 Q34 142 37 148 Q42 152 46 144 Q48 138 46 134" fill="#1A1A2E" stroke="#4A3728" stroke-width="0.3"/>

  <!-- Right side bob -->
  <path d="M158 72 Q162 40 144 20 Q132 8 118 2 L124 14 Q140 26 146 48 Q152 66 152 92 Q154 115 152 134 Q156 140 160 136 Q160 110 158 72 Z" fill="url(#hairGrad)"/>
  <!-- Right curl -->
  <path d="M160 133 Q166 142 163 148 Q158 152 154 144 Q152 138 154 134" fill="#1A1A2E" stroke="#4A3728" stroke-width="0.3"/>

  <!-- Hair dome top -->
  <path d="M46 42 Q50 10 72 2 Q86 -4 100 -5 Q114 -4 128 2 Q150 10 154 42 Q140 18 100 10 Q60 18 46 42 Z" fill="#2C2C54"/>

  <!-- Hair shine -->
  <path d="M74 6 Q88 -2 100 -3 Q108 -2 116 2" fill="none" stroke="#4A4A6A" stroke-width="2.5" opacity="0.3" stroke-linecap="round"/>

  <!-- ========== RED HEADBAND + BOW ========== -->
  <path d="M42 44 Q48 18 68 8 Q84 -2 100 -4 Q116 -2 132 8 Q152 18 158 44" fill="none" stroke="#E63946" stroke-width="6" stroke-linecap="round"/>

  <!-- Bow (big, cute) -->
  <path d="M100 0 Q76 -18 68 -8 Q62 4 78 14 Q90 6 100 0 Z" fill="#E63946" stroke="#C1303C" stroke-width="0.5"/>
  <path d="M100 0 Q124 -18 132 -8 Q138 4 122 14 Q110 6 100 0 Z" fill="#E63946" stroke="#C1303C" stroke-width="0.5"/>
  <circle cx="100" cy="0" r="5" fill="#F04858" stroke="#C1303C" stroke-width="0.5"/>
  <!-- Bow highlights -->
  <path d="M80 -6 Q84 -10 88 -6" fill="none" stroke="#FF7080" stroke-width="0.8" opacity="0.5"/>
  <path d="M112 -6 Q116 -10 120 -6" fill="none" stroke="#FF7080" stroke-width="0.8" opacity="0.5"/>

  <!-- ========== FACE (features clustered LOW, big forehead) ========== -->
  <!-- All features below y=88 (center of head at y=82, so below center) -->

  <!-- Eyebrows (soft, thin) -->
  <path d="M72 90 Q80 86 88 88" fill="none" stroke="#4A3728" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M112 88 Q120 86 128 90" fill="none" stroke="#4A3728" stroke-width="1.4" stroke-linecap="round"/>

  <!-- LEFT EYE -->
  <ellipse cx="82" cy="100" rx="14" ry="15" fill="#FFF8F0"/>
  <ellipse cx="83" cy="101" rx="10.5" ry="11.5" fill="url(#eyeShade)"/>
  <circle cx="83" cy="102" r="5.5" fill="#2D1B0E"/>
  <!-- Primary highlight (upper-left, big) -->
  <circle cx="77" cy="95" r="5" fill="white" opacity="0.95"/>
  <!-- Secondary highlight (lower-right) -->
  <circle cx="88" cy="106" r="2.5" fill="white" opacity="0.7"/>
  <!-- Sparkle dot -->
  <circle cx="80" cy="100" r="1" fill="white" opacity="0.5"/>
  <!-- Upper eyelid -->
  <path d="M68 96 Q75 86 83 85 Q91 86 96 96" stroke="#4A3728" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Lashes -->
  <line x1="69" y1="95" x2="65" y2="89" stroke="#4A3728" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="73" y1="90" x2="70" y2="84" stroke="#4A3728" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="77" y1="87" x2="76" y2="82" stroke="#4A3728" stroke-width="1.2" stroke-linecap="round"/>

  <!-- RIGHT EYE -->
  <ellipse cx="118" cy="100" rx="14" ry="15" fill="#FFF8F0"/>
  <ellipse cx="117" cy="101" rx="10.5" ry="11.5" fill="url(#eyeShade)"/>
  <circle cx="117" cy="102" r="5.5" fill="#2D1B0E"/>
  <circle cx="112" cy="95" r="5" fill="white" opacity="0.95"/>
  <circle cx="122" cy="106" r="2.5" fill="white" opacity="0.7"/>
  <circle cx="114" cy="100" r="1" fill="white" opacity="0.5"/>
  <path d="M104 96 Q111 86 117 85 Q125 86 132 96" stroke="#4A3728" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <line x1="131" y1="95" x2="135" y2="89" stroke="#4A3728" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="127" y1="90" x2="130" y2="84" stroke="#4A3728" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="123" y1="87" x2="124" y2="82" stroke="#4A3728" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Nose (tiny dot, close to eyes) -->
  <circle cx="100" cy="112" r="1.5" fill="#E8C0A8"/>

  <!-- Cheek blush (radial gradient, soft) -->
  <circle cx="64" cy="112" r="12" fill="url(#blushGrad)"/>
  <circle cx="136" cy="112" r="12" fill="url(#blushGrad)"/>

  <!-- Mouth (tiny, simple, close to nose) -->
  <path d="M94 120 Q97 118 100 119 Q103 118 106 120" fill="none" stroke="#E07A7A" stroke-width="1" stroke-linecap="round"/>
  <path d="M96 120 Q98 123 100 123.5 Q102 123 104 120" fill="#E07A7A" opacity="0.7"/>
</svg>