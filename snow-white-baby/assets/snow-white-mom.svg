<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <defs>
    <radialGradient id="skinGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FFF8F5"/>
      <stop offset="100%" stop-color="#FFE8DD"/>
    </radialGradient>
    <linearGradient id="hairGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#1C1C30"/>
      <stop offset="100%" stop-color="#0A0A18"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A80D4"/>
      <stop offset="100%" stop-color="#2E5CB8"/>
    </linearGradient>
    <linearGradient id="yellowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#F0C800"/>
    </linearGradient>
    <radialGradient id="sleeveGrad" cx="50%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#5A90E8"/>
      <stop offset="100%" stop-color="#3A6CC8"/>
    </radialGradient>
    <radialGradient id="eyeGrad" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#A0724A"/>
      <stop offset="50%" stop-color="#7B5230"/>
      <stop offset="100%" stop-color="#5A3A1E"/>
    </radialGradient>
  </defs>

  <!-- === YELLOW SKIRT === -->
  <path d="M58 200 Q50 235 42 275 L158 275 Q150 235 142 200 Z" fill="url(#yellowGrad)" stroke="#D4A800" stroke-width="0.5"/>
  <path d="M80 205 Q77 235 73 275" fill="none" stroke="#D4A800" stroke-width="0.7" opacity="0.3"/>
  <path d="M100 200 Q100 235 100 275" fill="none" stroke="#D4A800" stroke-width="0.7" opacity="0.2"/>
  <path d="M120 205 Q123 235 127 275" fill="none" stroke="#D4A800" stroke-width="0.7" opacity="0.3"/>

  <!-- === BLUE BODICE === -->
  <path d="M72 165 L67 200 L133 200 L128 165 Q118 157 100 154 Q82 157 72 165 Z" fill="url(#blueGrad)" stroke="#1E4A8A" stroke-width="0.5"/>

  <!-- === WHITE COLLAR (cute rounded) === -->
  <path d="M76 158 Q82 148 92 146 Q96 152 100 155 Q104 152 108 146 Q118 148 124 158 Q114 166 100 170 Q86 166 76 158 Z" fill="white" stroke="#E8E8E8" stroke-width="0.6"/>

  <!-- === PUFFY SLEEVES === -->
  <ellipse cx="62" cy="178" rx="20" ry="22" fill="url(#sleeveGrad)" stroke="#1E4A8A" stroke-width="0.5"/>
  <path d="M48 168 Q54 178 48 188" fill="none" stroke="#2858B0" stroke-width="0.6" opacity="0.25"/>
  <path d="M46 195 Q54 204 62 204 Q70 204 78 195" fill="none" stroke="#CC2244" stroke-width="3.5" stroke-linecap="round"/>

  <ellipse cx="138" cy="178" rx="20" ry="22" fill="url(#sleeveGrad)" stroke="#1E4A8A" stroke-width="0.5"/>
  <path d="M152 168 Q146 178 152 188" fill="none" stroke="#2858B0" stroke-width="0.6" opacity="0.25"/>
  <path d="M122 195 Q130 204 138 204 Q146 204 154 195" fill="none" stroke="#CC2244" stroke-width="3.5" stroke-linecap="round"/>

  <!-- === ARMS === -->
  <path d="M48 202 Q44 222 46 238" fill="none" stroke="#FFE8DD" stroke-width="8" stroke-linecap="round"/>
  <path d="M152 202 Q156 222 154 238" fill="none" stroke="#FFE8DD" stroke-width="8" stroke-linecap="round"/>

  <!-- === NECK === -->
  <rect x="93" y="135" width="14" height="20" rx="5" fill="url(#skinGrad)"/>

  <!-- === HEAD (big, round chibi-style for cuteness) === -->
  <ellipse cx="100" cy="85" rx="50" ry="52" fill="url(#skinGrad)" stroke="#F0D0C0" stroke-width="0.3"/>

  <!-- === HAIR (voluminous black bob) === -->
  <!-- Back hair -->
  <path d="M48 80 Q42 30 65 15 Q82 4 100 2 Q118 4 135 15 Q158 30 152 80 Q154 110 152 140 L148 136 Q150 110 148 82 Q148 38 132 22 Q118 10 100 8 Q82 10 68 22 Q52 38 52 82 Q52 110 54 136 L50 140 Q48 110 48 80 Z" fill="url(#hairGrad)"/>

  <!-- Left side bob (curls outward at bottom) -->
  <path d="M52 75 Q48 50 62 30 Q72 18 86 12 L80 24 Q66 35 60 55 Q55 72 54 100 Q53 120 54 136 Q50 142 48 138 L48 110 Q48 88 52 75 Z" fill="url(#hairGrad)"/>
  <!-- Left curl -->
  <path d="M48 135 Q42 144 45 150 Q50 154 55 146 Q56 140 54 136" fill="#0A0A18"/>

  <!-- Right side bob -->
  <path d="M148 75 Q152 50 138 30 Q128 18 114 12 L120 24 Q134 35 140 55 Q145 72 146 100 Q147 120 146 136 Q150 142 152 138 L152 110 Q152 88 148 75 Z" fill="url(#hairGrad)"/>
  <!-- Right curl -->
  <path d="M152 135 Q158 144 155 150 Q150 154 145 146 Q144 140 146 136" fill="#0A0A18"/>

  <!-- Hair top dome -->
  <path d="M56 48 Q58 18 78 8 Q90 2 100 1 Q110 2 122 8 Q142 18 144 48 Q132 25 100 18 Q68 25 56 48 Z" fill="#1C1C30"/>

  <!-- Hair shine -->
  <path d="M76 10 Q88 4 100 3 Q108 4 114 7" fill="none" stroke="#3838558" stroke-width="2" opacity="0.25" stroke-linecap="round"/>

  <!-- === RED HEADBAND WITH BIG BOW === -->
  <path d="M52 52 Q56 30 75 18 Q88 8 100 6 Q112 8 125 18 Q144 30 148 52" fill="none" stroke="#DD2244" stroke-width="6" stroke-linecap="round"/>

  <!-- Bow - big and cute -->
  <!-- Left loop -->
  <path d="M100 10 Q78 -8 70 2 Q64 12 76 22 Q88 16 100 10 Z" fill="#DD2244" stroke="#BB1A38" stroke-width="0.6"/>
  <path d="M82 6 Q86 2 90 6" fill="none" stroke="#FF6677" stroke-width="0.8" opacity="0.4"/>
  <!-- Right loop -->
  <path d="M100 10 Q122 -8 130 2 Q136 12 124 22 Q112 16 100 10 Z" fill="#DD2244" stroke="#BB1A38" stroke-width="0.6"/>
  <path d="M110 6 Q114 2 118 6" fill="none" stroke="#FF6677" stroke-width="0.8" opacity="0.4"/>
  <!-- Center knot -->
  <ellipse cx="100" cy="10" rx="5" ry="6" fill="#EE3355" stroke="#BB1A38" stroke-width="0.5"/>
  <!-- Bow tails -->
  <path d="M95 14 Q88 26 82 28" fill="none" stroke="#CC2244" stroke-width="2" stroke-linecap="round"/>
  <path d="M105 14 Q112 26 118 28" fill="none" stroke="#CC2244" stroke-width="2" stroke-linecap="round"/>

  <!-- === FACE === -->

  <!-- Eyebrows -->
  <path d="M72 68 Q80 62 90 65" fill="none" stroke="#1A1A2E" stroke-width="1.6" stroke-linecap="round"/>
  <path d="M110 65 Q120 62 128 68" fill="none" stroke="#1A1A2E" stroke-width="1.6" stroke-linecap="round"/>

  <!-- LEFT EYE - bigger, sparklier -->
  <ellipse cx="82" cy="82" rx="15" ry="16" fill="white" stroke="#1A1A2E" stroke-width="0.5"/>
  <!-- Iris (larger) -->
  <ellipse cx="83" cy="83" rx="11" ry="12" fill="url(#eyeGrad)"/>
  <!-- Pupil -->
  <circle cx="83" cy="84" r="5.5" fill="#1A1A2E"/>
  <!-- Main highlight (big sparkle) -->
  <circle cx="77" cy="77" r="5" fill="white" opacity="0.95"/>
  <!-- Secondary highlight -->
  <circle cx="88" cy="88" r="2.5" fill="white" opacity="0.7"/>
  <!-- Star sparkle -->
  <g transform="translate(79,81)" opacity="0.5">
    <line x1="0" y1="-2" x2="0" y2="2" stroke="white" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="-2" y1="0" x2="2" y2="0" stroke="white" stroke-width="0.8" stroke-linecap="round"/>
  </g>
  <!-- Upper lid (curvy, cute) -->
  <path d="M67 76 Q75 66 83 65 Q91 66 97 76" stroke="#1A1A2E" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Eyelashes (fluttery) -->
  <line x1="68" y1="75" x2="63" y2="69" stroke="#1A1A2E" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="72" y1="70" x2="69" y2="64" stroke="#1A1A2E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="76" y1="68" x2="75" y2="62" stroke="#1A1A2E" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Lower lash -->
  <path d="M72 96 Q82 99 92 96" stroke="#8D6E63" stroke-width="0.5" fill="none"/>

  <!-- RIGHT EYE -->
  <ellipse cx="118" cy="82" rx="15" ry="16" fill="white" stroke="#1A1A2E" stroke-width="0.5"/>
  <ellipse cx="117" cy="83" rx="11" ry="12" fill="url(#eyeGrad)"/>
  <circle cx="117" cy="84" r="5.5" fill="#1A1A2E"/>
  <circle cx="112" cy="77" r="5" fill="white" opacity="0.95"/>
  <circle cx="122" cy="88" r="2.5" fill="white" opacity="0.7"/>
  <g transform="translate(114,81)" opacity="0.5">
    <line x1="0" y1="-2" x2="0" y2="2" stroke="white" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="-2" y1="0" x2="2" y2="0" stroke="white" stroke-width="0.8" stroke-linecap="round"/>
  </g>
  <path d="M103 76 Q111 66 117 65 Q125 66 133 76" stroke="#1A1A2E" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <line x1="132" y1="75" x2="137" y2="69" stroke="#1A1A2E" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="128" y1="70" x2="131" y2="64" stroke="#1A1A2E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="124" y1="68" x2="125" y2="62" stroke="#1A1A2E" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M108 96 Q118 99 128 96" stroke="#8D6E63" stroke-width="0.5" fill="none"/>

  <!-- Nose (tiny dot) -->
  <circle cx="100" cy="99" r="1.5" fill="#F0C8B8"/>

  <!-- Rosy cheeks (bigger, pinker, with tiny hearts) -->
  <ellipse cx="64" cy="100" rx="12" ry="8" fill="#FFB0B8" opacity="0.55"/>
  <ellipse cx="136" cy="100" rx="12" ry="8" fill="#FFB0B8" opacity="0.55"/>
  <!-- Tiny heart on left cheek -->
  <path d="M60 97 Q60 95 62 95 Q63 95 63 97 Q63 95 64 95 Q66 95 66 97 Q66 100 63 102 Q60 100 60 97 Z" fill="#FF8899" opacity="0.4"/>

  <!-- Mouth - tiny cat-smile (ω) -->
  <path d="M94 112 Q97 110 100 111 Q103 110 106 112" fill="none" stroke="#DD3355" stroke-width="1" stroke-linecap="round"/>
  <path d="M95 112 Q97.5 116 100 116.5 Q102.5 116 105 112" fill="#EE4466" stroke="#DD3355" stroke-width="0.3"/>
  <!-- Lip shine -->
  <ellipse cx="100" cy="113" rx="2" ry="0.8" fill="#FF8899" opacity="0.4"/>
</svg>